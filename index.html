<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porter Design - Kalkulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Styl dla nieaktywnego przycisku */
        .chip { 
            cursor: pointer; 
            border: 2px solid #e2e8f0; 
            transition: all 0.2s;
            background-color: white;
        }
        /* Styl dla aktywnego przycisku - wymuszony kolorami Tailwind */
        .chip.active { 
            border-color: #22c55e !important; 
            background-color: #f0fdf4 !important; 
            color: #166534 !important;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 pb-40 text-gray-800">

    <div class="max-w-2xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border">
            <h1 class="text-xl font-bold text-green-700">System Ofertowy Porter Design</h1>
        </div>

        <div class="bg-white rounded-3xl shadow-lg border overflow-hidden">
            <div class="p-6 space-y-8">
                
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">Typ produktu</label>
                    <div class="grid grid-cols-2 sm:grid-cols-5 gap-2" id="productGroup">
                        <div class="chip active p-2 rounded-xl text-[11px] text-center" onclick="handleSelect(this, 'product')">Zasłony</div>
                        <div class="chip p-2 rounded-xl text-[11px] text-center" onclick="handleSelect(this, 'product')">Żaluzje</div>
                        <div class="chip p-2 rounded-xl text-[11px] text-center" onclick="handleSelect(this, 'product')">Rolety rzymskie</div>
                        <div class="chip p-2 rounded-xl text-[11px] text-center" onclick="handleSelect(this, 'product')">Szyny KAES</div>
                        <div class="chip p-2 rounded-xl text-[11px] text-center" onclick="handleSelect(this, 'product')">Karnisze el.</div>
                    </div>
                </div>

                <div id="section-zaslony" class="bg-gray-50 p-6 rounded-2xl space-y-6 border">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1">Szerokość (cm)</label>
                            <input type="number" id="inp-szer" oninput="calculate()" class="w-full p-3 rounded-xl border focus:ring-2 ring-green-500 outline-none" placeholder="0">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1">Wysokość (cm)</label>
                            <input type="number" id="inp-wys" oninput="calculate()" class="w-full p-3 rounded-xl border focus:ring-2 ring-green-500 outline-none" placeholder="0">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Typ szycia</label>
                        <div class="flex gap-2">
                            <div class="chip active flex-1 p-3 rounded-xl text-xs text-center" onclick="handleSelect(this, 'szycie', 100)">Flex (100 zł)</div>
                            <div class="chip flex-1 p-3 rounded-xl text-xs text-center" onclick="handleSelect(this, 'szycie', 110)">Wave (110 zł)</div>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Marszczenie</label>
                        <div class="flex gap-2">
                            <div class="chip active flex-1 p-3 rounded-xl text-xs text-center" onclick="handleSelect(this, 'marsz', 1.5)">150%</div>
                            <div class="chip flex-1 p-3 rounded-xl text-xs text-center" onclick="handleSelect(this, 'marsz', 2.0)">200%</div>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Kategoria tkaniny</label>
                        <div class="flex flex-col gap-2">
                            <div class="chip active p-3 rounded-xl text-xs px-4" onclick="handleSelect(this, 'kat', 160)">Basic (160 zł/mb)</div>
                            <div class="chip p-3 rounded-xl text-xs px-4" onclick="handleSelect(this, 'kat', 190)">Standard (190 zł/mb)</div>
                            <div class="chip p-3 rounded-xl text-xs px-4" onclick="handleSelect(this, 'kat', 220)">Premium (220 zł/mb)</div>
                        </div>
                    </div>
                </div>

                <div id="section-other" class="hidden p-10 text-center text-gray-400 italic bg-gray-50 rounded-2xl border-2 border-dashed">
                    Moduł w trakcie konfiguracji...
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-6 shadow-2xl z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 font-black uppercase">Suma</p>
                <p id="total-price" class="text-4xl font-black text-green-600">0,00 zł</p>
            </div>
            <button class="bg-gray-900 text-white px-8 py-4 rounded-2xl font-bold">PDF</button>
        </div>
    </div>

    <script>
        // Startowe wartości
        let valSzycie = 100;
        let valMarsz = 1.5;
        let valKat = 160;

        function handleSelect(el, type, price) {
            // 1. Zmień wygląd przycisków w grupie
            const parent = el.parentElement;
            const chips = parent.querySelectorAll('.chip');
            chips.forEach(c => c.classList.remove('active'));
            el.classList.add('active');

            // 2. Obsłuż zmianę produktu
            if (type === 'product') {
                const isCurtain = el.innerText === 'Zasłony';
                document.getElementById('section-zaslony').style.display = isCurtain ? 'block' : 'none';
                document.getElementById('section-other').style.display = isCurtain ? 'none' : 'block';
            }

            // 3. Przypisz wartości do obliczeń
            if (type === 'szycie') valSzycie = price;
            if (type === 'marsz') valMarsz = price;
            if (type === 'kat') valKat = price;

            calculate();
        }

        function calculate() {
            const szer = parseFloat(document.getElementById('inp-szer').value) || 0;
            const display = document.getElementById('total-price');

            if (szer > 0) {
                const mb = (szer * valMarsz) / 100;
                const suma = mb * (valKat + valSzycie);
                display.innerText = suma.toLocaleString('pl-PL', {style: 'currency', currency: 'PLN'});
            } else {
                display.innerText = "0,00 zł";
            }
        }
    </script>
</body>
</html>
