function jzLookup(type, wCm, lCm){
  var tbl=JZ[type];
  if(!tbl)return null;
  var ws=Object.keys(tbl).map(Number).sort(function(a,b){return a-b;});
  var ls=Object.keys(tbl[ws[0]]).map(Number).sort(function(a,b){return a-b;});
  var w=ws.find(function(x){return x>=wCm;})||ws[ws.length-1];
  var l=ls.find(function(x){return x>=lCm;})||ls[ls.length-1];
  return tbl[w]&&tbl[w][l]?{price:tbl[w][l],w:w,l:l}:null;
}

function lookup(val,obj){
  var keys=Object.keys(obj).map(Number).sort(function(a,b){return a-b;});
  var k=keys.find(function(k){return k>=val;})||keys[keys.length-1];
  return {p:obj[k],k:k};
}

function calc(p){
  var c=p.c||{},par=p.par||{};
  var fabP=p.fabMan!=null?p.fabMan:(p.fabP!=null?p.fabP:null);
  var fabW=p.fabW||0;
  var total=0,lines=[],warn=null;

  if(p.type==="zaslona"||p.type==="firana"){
    var wCm=par.wCm||0,hCm=par.hCm||0;
    var belka=fabW,mars=+(c.mars||"1.5"),szycie=c.sz==="wave"?110:100;
    var dekro=c.dekro==="tak",hM=hCm/100;
    if(!wCm||!(p.panels||[]).length||fabP==null)return{total:0,lines:[],warn:fabP==null&&wCm?"Wybierz tkanin\u0119":null};
    var useA2=belka>0&&hCm+20>belka;
    (p.panels||[]).forEach(function(pn){
      var pw=pn.w||0;if(!pw){lines.push(pn.side+": wpisz szerokość (cm)");return;}var pwZ=pw+20,pm=pwZ/100,z,kt,ks,koszt;
      if(useA2){
        var pg=Math.ceil((belka/mars)/10)*10-20,lp=Math.ceil(pwZ/pg);
        z=+(lp*hM+0.2).toFixed(2);kt=+(z*fabP).toFixed(2);
        var sv=hM<=3?100:hM<=3.7?130:hM<=4.9?170:230;
        ks=dekro?+(z*sv).toFixed(2):+(lp*250).toFixed(2);
      }else{
        z=+(pm*mars+0.2).toFixed(2);kt=+(z*fabP).toFixed(2);
        var sv2=hM<=3?100:hM<=3.7?130:hM<=4.9?170:230;
        ks=dekro?+(z*sv2).toFixed(2):+(z*szycie).toFixed(2);
      }
      koszt=kt+ks;total+=koszt;
      lines.push(pn.side+" "+pw+"cm \u00b7 "+z+"mb \u2192 "+koszt.toFixed(2).replace(".",",")+" z\u0142");
    });
  }else if(p.type==="zaluzja"){
    var wCm=par.wCm||0,lCm=par.lCm||0;
    var jt=c.jt||"al25";
    if(!wCm||!lCm)return{total:0,lines:[],warn:null};
    var res=jzLookup(jt,wCm,lCm);
    if(!res)return{total:0,lines:[],warn:"Wymiary poza zakresem cennika."};
    total=res.price;
    // dopłaty
    if(c.bezinw==="tak"){
      var bDop;
      if(jt==="al50")bDop=85.03;
      else if(jt==="al25"||jt==="al35")bDop=74.73;
      else bDop=57.12; // drewnopodobne: ba35,ba50,ba65,bs35,bs50,bs65
      total+=bDop;
      lines.push("Monta\u017c bezinwazyjny +"+bDop.toFixed(2)+" z\u0142");
    }
    if(c.tasiemka==="tak"){
      var tDop=46.43;
      if(wCm<60){warn=(warn?warn+" | ":"")+"Tasiemka niedostępna dla szer. < 60 cm.";c.tasiemka=undefined;}
      else{total+=tDop;lines.push("Dodatkowa tasiemka +"+tDop.toFixed(2)+" z\u0142");}
    }
    lines.push(JZ_LABELS[jt]+" "+wCm+"\xd7"+lCm+"cm \u2192 "+res.price+" z\u0142");
    // strefy
    var pow=(wCm/100)*(lCm/100);
    var z=JZ_ZONES[jt]||{};
    if(z.blue&&pow>=z.blue)warn="Strefa niebieska ("+pow.toFixed(2)+"m\xb2) \u2014 wymagana obs\u0142uga elektryczna.";
    else if(z.red&&pow>=z.red)warn="Strefa czerwona ("+pow.toFixed(2)+"m\xb2) \u2014 ograniczona gwarancja.";
    if(c.jzMode==="auto"){
      var mot=JZALUZJA_MOTORS.find(function(m){return m.id===c.jzMotorId;});
      var rem=JZALUZJA_REMOTES.find(function(r){return r.id===c.jzRemoteId;});
      if(mot){total+=mot.price;lines.push("Silnik: "+mot.label+" +"+mot.price.toFixed(2)+" zł");}
      if(rem){total+=rem.price;lines.push("Pilot: "+rem.label+" +"+rem.price.toFixed(2)+" zł");}
    }
  }else if(p.type==="roleta"){
    var wCm=par.wCm||0,hCm=par.hCm||0;
    if(!wCm||!hCm)return{total:0,lines:[],warn:null};
    // Nowy system: c.rModel (relax/print/back/podszewka/front/cascade/duo)
    var rModel=c.rModel||null;
    if(!rModel)return{total:0,lines:[],warn:"Wybierz model rolety"};
    var rb=c.rb==="tak"?11:0;
    var tkan=fabP!=null?fabP:160;
    var pow=parseFloat(((wCm/100)*(hCm/100)).toFixed(3));
    var rr;
    if(rModel==="duo"){
      // Duo: dwie tkaniny, mnożone x2
      rr=lookup(wCm,RDUO);
      total=parseFloat((rr.p*2+rb).toFixed(2))+parseFloat((pow*(200+tkan)*2).toFixed(2));
      lines.push("Roleta Duo "+wCm+"\xd7"+hCm+"cm \xb7 "+pow+"m\xb2 (x2 tkaniny)");
    }else{
      // Wszystkie inne: jednolita logika 200zł/m² szycie + tkanina
      rr=lookup(wCm,RCITY);
      total=parseFloat((rr.p*2+rb).toFixed(2))+parseFloat((pow*(200+tkan)).toFixed(2));
      if(c.rSystem==="elektryk"){
        rr=lookup(wCm,REL);
        total=parseFloat((rr.p*2+rb).toFixed(2))+parseFloat((pow*(200+tkan)).toFixed(2));
      }
      lines.push("Roleta "+rModel+" "+wCm+"\xd7"+hCm+"cm \xb7 "+pow+"m\xb2");
    }
    if(rb)lines.push("+ B\u0119benek 11 z\u0142");
  }else if(p.type==="szyna"){
    var lenCm=par.len||0,arc=par.arc||0,pts=par.pts||0;
    if(!lenCm)return{total:0,lines:[],warn:null};
    var lenMb=lenCm/100;
    var baz;
    if(c.ks==="wave"){var rw=lookup(lenCm,KW[c.kk||"biala"]);baz=rw.p;}
    else baz=parseFloat((lenMb*80).toFixed(2));
    total=baz+parseFloat((arc*100).toFixed(2))+parseFloat((pts*60).toFixed(2));
    lines.push("KS "+(c.ks||"flex")+" "+lenCm+"cm ("+lenMb.toFixed(2)+"mb)");
    if(c.km==="sciana")warn="\u015acienny \u2014 dolicz uchwyty \u015bcienne.";
  }else if(p.type==="karnisz"){
    var lenK=par.len||0,pt=par.pt||0,arc=par.arc||0;
    if(!lenK)return{total:0,lines:[],warn:null};
    var st=c.km==="universal"?KUNIV:KSLIM;
    var rk=lookup(lenK,st);
    total=rk.p+(KN[c.kn||"am75"]||0)+(KP[c.kp||"brak"]||0)+pt*210+arc*318;
    lines.push("Karnisz "+(c.km||"slim").toUpperCase()+" do "+rk.k+"cm");
  }
  return{total:total,lines:lines,warn:warn};
}

function InlineEdit(p){
  // p: {value, onSave, style, inputStyle}
  var es=useState(false),editing=es[0],setEditing=es[1];
  var vs=useState(p.value),val=vs[0],setVal=vs[1];
  React.useEffect(function(){setVal(p.value);},[p.value]);
  function confirm(){
    if(val.trim()) p.onSave(val.trim());
    setEditing(false);
  }
  if(editing){
    return ce("span",{style:{display:"inline-flex",alignItems:"center",gap:4}},
      ce("input",{autoFocus:true,value:val,
        onChange:function(ev){setVal(ev.target.value);},
        onKeyDown:function(ev){
          if(ev.key==="Enter")confirm();
          if(ev.key==="Escape"){setVal(p.value);setEditing(false);}
        },
        onBlur:confirm,
        style:Object.assign({},{fontSize:16,fontWeight:500,border:"none",borderBottom:"2px solid var(--gr)",outline:"none",background:"transparent",color:"var(--t1)",padding:"2px 4px",minWidth:120,maxWidth:"90vw"},p.inputStyle||{})
      })
    );
  }
  return ce("span",{style:Object.assign({},{display:"inline-flex",alignItems:"center",gap:5,cursor:"pointer"},p.style||{})},
    ce("span",{},p.value),
    ce("span",{
      onClick:function(ev){ev.stopPropagation();setEditing(true);},
      title:"Edytuj",
      style:{fontSize:18,color:"var(--t3)",opacity:0.75,lineHeight:1,padding:"6px 8px",borderRadius:8,
             border:"0.5px solid transparent",transition:"all .15s",cursor:"pointer",
             ":hover":{opacity:1}}
    },"\u270f\ufe0f")
  );
}

function formatPLN(n){return roundTo10(n).toLocaleString("pl-PL")+" zł";}
function roundTo10(n){var r=n%10;return r<5?n-r:n+(10-r);}

function getPDFOfferNumber(client){
  var now=new Date();
  var y=now.getFullYear();
  var m=String(now.getMonth()+1).padStart(2,"0");
  var d=String(now.getDate()).padStart(2,"0");
  var slug=(client.name||"").replace(/\s+/g,"-").slice(0,12);
  return "OF-"+y+m+d+"-"+slug;
}

function buildOfferRows(client){
  // Returns [{lp, name, qty, unit, cenaJedn, total}]
  var rows=[];var lp=1;
  (client.rooms||[]).forEach(function(r){
    (r.windows||[]).forEach(function(w){
      (w.products||[]).forEach(function(p){
        var pfc=(p.type==="zaslona"||p.type==="firana")?mg(p,{panels:getPanelsForProd(p)}):p;
        var total=p.mp!=null?p.mp:(calc(pfc).total||0);
        if(!total)return;
        var lbl=(PROD_TYPES.find(function(t){return t.id===p.type;})||{label:p.type}).label;
        var desc=lbl+(p.fabName?" \u00b7 "+p.fabName:"")+" — "+r.name+" / "+w.name;
        rows.push({lp:lp++,name:desc,qty:1,unit:"szt.",cenaJedn:total,total:total});
      });
    });
  });
  return rows;
}

function buildFabricRows(client){
  // Group by fabric: {fabName, prod, brutto, width, metry}
  var map={};
  (client.rooms||[]).forEach(function(r){
    (r.windows||[]).forEach(function(w){
      (w.products||[]).forEach(function(p){
        if(p.type!=="zaslona"&&p.type!=="firana")return;
        var key=p.fabName||("reczna_"+p.fabMan);
        if(!map[key])map[key]={
          fabName:p.fabName||"Tkanina ręczna",
          prod:p.fabName?(FABRICS.find(function(f){return f.name===p.fabName;})||{prod:"-"}).prod:"-",
          brutto:p.fabMan||p.fabP||0,
          width:p.fabW||null,
          metry:0,rooms:[]
        };
        var panels=getPanelsForProd(p);
        var pForCalc=Object.assign({},p,{panels:panels});
        var res=calc(pForCalc);
        var metry=0;
        (res.lines||[]).forEach(function(l){
          var m=l.match(/([\d,.]+)mb/);if(m)metry+=parseFloat(m[1].replace(",","."));
        });
        map[key].metry+=metry;
        map[key].rooms.push(r.name+" / "+w.name+(p.note?(" ["+p.note+"]"):""));
      });
    });
  });
  return Object.values(map);
}

function getPanelsForProd(prod){
  var pc=prod.c||{},par=prod.par||{},tw=par.wCm||0,sp=pc.split||"unequal";
  if(sp==="left") return [{side:"Zas\u0142ona lewa",w:tw}];
  if(sp==="right") return [{side:"Zas\u0142ona prawa",w:tw}];
  if(sp==="equal"){var h=Math.floor(tw/2);return [{side:"Zas\u0142ona lewa",w:h},{side:"Zas\u0142ona prawa",w:tw-h}];}
  var out=[];
  if(pc.leftW>0) out.push({side:"Zas\u0142ona lewa",w:pc.leftW});
  if(pc.rightW>0) out.push({side:"Zas\u0142ona prawa",w:pc.rightW});
  return out;
}

function buildSewingRows(client){
  var rows=[];
  (client.rooms||[]).forEach(function(r){
    (r.windows||[]).forEach(function(w){
      (w.products||[]).forEach(function(prod){
        if(prod.type!=="zaslona"&&prod.type!=="firana")return;
        var panels=getPanelsForProd(prod);
        var prodForCalc=Object.assign({},prod,{panels:panels});
        var res=calc(prodForCalc);
        var metry=0;
        (res.lines||[]).forEach(function(l){
          var m=l.match(/([\d,.]+)mb/);if(m)metry+=parseFloat(m[1].replace(",","."));
        });
        var pc=prod.c||{},par=prod.par||{};
        var lbl=(PROD_TYPES.find(function(t){return t.id===prod.type;})||{label:prod.type}).label;
        var sz=pc.sz==="wave"?"Wave":"Flex";
        var mars=pc.mars?(Math.round(+pc.mars*100))+"%":"150%";
        var split=pc.split||"unequal";
        var splitDesc="-";
        if(split==="left") splitDesc="Lewa sztuka";
        else if(split==="right") splitDesc="Prawa sztuka";
        else if(split==="equal"){var tw2=par.wCm||0;splitDesc="Komplet r\xf3wny ("+Math.floor(tw2/2)+" + "+Math.ceil(tw2/2)+" cm)";}
        else splitDesc="Komplet nier\xf3wny: L="+(pc.leftW||0)+"cm / P="+(pc.rightW||0)+"cm";
        var bottomMap={single:"Pojedynczy",double:"Podw\xf3jny",overlock:"Overlock",tape:"Ta\u015bma obci\u0105\u017caj\u0105ca doszyta"};
        var bottomDesc=(bottomMap[pc.bottomType||"single"]||"Pojedynczy")+(pc.bottomSize?" "+pc.bottomSize+"cm":"");
        var fabObj=prod.fabName?FABRICS.find(function(f){return f.name===prod.fabName;}):null;
        rows.push({
          room:r.name,win:w.name,
          type:lbl,
          fabric:prod.fabName||(prod.fabMan?"r\u0119czna "+prod.fabMan+" z\u0142":"(brak)"),
          prod:fabObj?fabObj.prod:"",
          fabW:prod.fabW||prod.fabManW||"-",
          kolor:pc.kolor||"-",
          metry:metry,
          hCm:par.hCm||"-",
          wCm:par.wCm||"-",
          szStyle:sz+" "+mars,
          split:splitDesc,
          bottom:bottomDesc,
          glide:"Odst\u0119p "+(pc.glideGap||8)+" cm",
          leadInSides:pc.leadInSides?"tak":"nie",
          note:prod.note||""
        });
      });
    });
  });
  return rows;
}

function openPDFWindow(htmlContent, title){
  var w=window.open("","_blank","width=900,height=700");
  if(!w){alert("Zezwól na wyskakujące okna dla tej strony.");return;}
  w.document.open();
  w.document.write(htmlContent);
  w.document.close();
  setTimeout(function(){w.focus();},200);
}

function makeTableHTML(headers, rows, caption){
  var headerHTML=headers.map(function(h){return "<th>"+h+"</th>";}).join("");
  var rowsHTML=rows.map(function(r){
    return "<tr>"+r.map(function(c){return "<td>"+c+"</td>";}).join("")+"</tr>";
  }).join("");
  return "<table><caption>"+caption+"</caption><thead><tr>"+headerHTML+"</tr></thead><tbody>"+rowsHTML+"</tbody></table>";
}

function pdfStyles(){
  return `<style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#1a1a18;background:#fff;padding:18mm 16mm;}
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10mm;border-bottom:0.5px solid #c8c8c4;padding-bottom:7mm;}
    .logo-text{font-size:20px;font-weight:700;letter-spacing:0.15em;color:#1a1a18;}
    .logo-sub{font-size:8px;letter-spacing:0.25em;color:#6b6b66;text-transform:uppercase;margin-top:2px;}
    .doc-title{font-size:16px;font-weight:700;margin-bottom:6mm;}
    .meta{display:flex;gap:12mm;margin-bottom:6mm;}
    .meta-block{flex:1;}
    .meta-block h4{font-size:8px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#6b6b66;margin-bottom:3px;}
    .meta-block p{font-size:10px;line-height:1.5;}
    table{width:100%;border-collapse:collapse;margin-bottom:6mm;}
    caption{font-size:8px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#6b6b66;text-align:left;margin-bottom:3px;}
    th{background:#f2f2ef;font-size:8px;font-weight:600;padding:4px 6px;text-align:left;border-bottom:0.5px solid #c8c8c4;}
    td{padding:4px 6px;border-bottom:0.5px solid #eaeae6;font-size:9px;vertical-align:top;}
    tr:last-child td{border-bottom:none;}
    .total-row td{font-weight:700;background:#f8f8f6;font-size:10px;}
    .sum-box{background:#1a1a18;color:#fff;padding:8px 12px;border-radius:6px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6mm;}
    .sum-box .label{font-size:9px;letter-spacing:0.06em;opacity:0.7;}
    .sum-box .amount{font-size:15px;font-weight:700;}
    .notes{font-size:9px;border:0.5px solid #c8c8c4;border-radius:4px;padding:6px 10px;margin-bottom:8mm;line-height:1.6;}
    .footer{margin-top:10mm;border-top:0.5px solid #eaeae6;padding-top:5mm;display:flex;justify-content:space-between;font-size:8px;color:#a8a8a4;}
    .sign-block{margin-top:12mm;display:flex;justify-content:space-between;}
    .sign-block .sign{width:180px;border-top:0.5px solid #1a1a18;padding-top:3px;font-size:8px;color:#6b6b66;text-align:center;}
    @media print{body{padding:12mm 10mm;} @page{size:A4;margin:0;}}
  </style>`;
}

function generateOfferPDF(client,comm){
  comm=comm||0;
  var rows=buildOfferRows(client);
  if(!rows.length){alert("Brak wycenionych produktów.");return;}
  // Apply commission multiplier to each row
  if(comm>0){
    rows=rows.map(function(r){
      var newTotal=roundTo10(r.total*(1+comm));
      return Object.assign({},r,{total:newTotal,cenaJedn:newTotal});
    });
  }
  var total=rows.reduce(function(a,r){return a+r.total;},0);
  var netto=total/1.23;var vat=total-netto;
  var now=new Date();
  var dateStr=now.toLocaleDateString("pl-PL");
  var validStr=new Date(now.getTime()+30*24*3600*1000).toLocaleDateString("pl-PL");
  var offerNo=getPDFOfferNumber(client);

  var tableRows=rows.map(function(r){
    return [r.lp,r.name,r.qty,r.unit,
      r.cenaJedn.toFixed(2).replace(".",",")+" zł",
      (r.total/1.23).toFixed(2).replace(".",",")+" zł",
      "23%",
      (r.total-r.total/1.23).toFixed(2).replace(".",",")+" zł",
      r.total.toFixed(2).replace(".",",")+" zł"
    ];
  });
  tableRows.push(["","","","","<strong>Suma:</strong>",
    netto.toFixed(2).replace(".",",")+" zł","23%",
    vat.toFixed(2).replace(".",",")+" zł",

// ── Suppliers for karnisze / szyny ─────────────────────────────────────────
var KARNISZ_SUPPLIERS=[
  {key:"marcin_dekor", label:"Marcin Dekor"},
  {key:"forest_polska",label:"Forest Polska, ul. Poloneza 89, 02-826 Warszawa"}
];

function buildKarniszRows(client){
  var rows=[];
  (client.rooms||[]).forEach(function(r){
    (r.windows||[]).forEach(function(w){
      (w.products||[]).forEach(function(p){
        if(p.type!=="karnisz"&&p.type!=="szyna")return;
        var pc=p.c||{},par=p.par||{};
        var typLabel=p.type==="karnisz"?"Karnisz el. "+(pc.km||"slim").toUpperCase():"Szyna KS "+(pc.ks||"flex");
        var len=par.len||0;
        var res=calc(p);
        rows.push({
          room:r.name,
          win:w.name,
          type:typLabel,
          len:len,
          arc:par.arc||0,
          pts:par.pt||par.pts||0,
          supplier:p.karniszSupplier||"",
          total:res.total||0,
          lines:(res.lines||[]).join("; ")
        });
      });
    });
  });
  return rows;
}

function generateKarniszOrderPDF(client){
  var rows=buildKarniszRows(client);
  if(!rows.length){alert("Brak karnisz\xf3w / szyn do zam\xf3wienia.");return;}
  var now=new Date();var dateStr=now.toLocaleDateString("pl-PL");

  // Ask which supplier for each row that has no supplier assigned
  // Present a simple prompt listing items and asking for Marcin Dekor or Forest Polska
  var resolved=rows.map(function(r){
    if(r.supplier)return r;
    var answer=window.prompt(
      r.room+" / "+r.win+" — "+r.type+" ("+r.len+"cm)\n\nWybierz dostawcę:\n1 — Marcin Dekor\n2 — Forest Polska\n\nWpisz 1 lub 2:",""
    );
    if(answer===null)return null; // cancelled
    var sup=answer==="2"?"forest_polska":"marcin_dekor";
    return Object.assign({},r,{supplier:sup});
  });

  // If any prompt was cancelled
  if(resolved.indexOf(null)>=0)return;

  // Group by supplier
  var bySupplier={};
  KARNISZ_SUPPLIERS.forEach(function(s){bySupplier[s.key]=[];});
  resolved.forEach(function(r){
    var key=(r.supplier&&bySupplier[r.supplier]!==undefined)?r.supplier:"marcin_dekor";
    bySupplier[key].push(r);
  });

  var activeSups=KARNISZ_SUPPLIERS.filter(function(s){return bySupplier[s.key].length>0;});
  if(!activeSups.length){alert("Brak pozycji.");return;}

  var supplierSections=activeSups.map(function(sup,si){
    var supRows=bySupplier[sup.key];
    var tableRows=supRows.map(function(r){
      return [
        r.room+" / "+r.win,
        r.type,
        r.len?r.len+"cm":"-",
        r.arc?r.arc+" mb":"–",
        r.pts?r.pts+" szt.":"–",
        r.total>0?r.total.toFixed(2).replace(".",",")+"\u00a0z\u0142":"–"
      ];
    });

    var tableHTML=makeTableHTML(
      ["Pom. / Okno","Typ","D\u0142ugo\u015b\u0107","Gi\u0119cie \u0142uk","Gi\u0119cie pkt","Warto\u015b\u0107"],
      tableRows,
      "Pozycje do zam\xf3wienia"
    );

    var pageBreak=si>0?"<div style=\"page-break-before:always;padding-top:10mm;\"></div>":"";

    return pageBreak+"\n    <div class=\"supplier-header\">\n      <div class=\"supplier-name\">"+sup.label+"</div>\n      <div class=\"supplier-meta\">Zamawiaj\u0105cy: <strong>"+SELLER.name+"</strong>  |  Tel.: "+SELLER.tel+"  |  E-mail: "+SELLER.email+"</div>\n      <div class=\"supplier-meta\">Klient ko\u0144cowy: <strong>"+client.name+"</strong>"+(client.addr?" \u2014 "+client.addr:"")+"  |  Data: "+dateStr+"</div>\n    </div>\n    "+tableHTML+"\n    <div class=\"notes\" style=\"margin-top:4mm\">Termin dostawy: _________________ &nbsp;&nbsp;&nbsp; Forma p\u0142atno\u015bci: _________________ &nbsp;&nbsp;&nbsp; Podpis: _________________</div>\n    <div class=\"sign-block\" style=\"margin-top:8mm\">\n      <div class=\"sign\">Zamawiaj\u0105cy<br><strong>Paulina Porter</strong></div>\n      <div class=\"sign\">Dostawca \u2014 potwierdzenie</div>\n    </div>";
  }).join("");

  var extraStyles="\n    .supplier-header{background:#f2f2ef;border:0.5px solid #c8c8c4;border-radius:4px;padding:8px 12px;margin-bottom:5mm;}\n    .supplier-name{font-size:14px;font-weight:700;color:#1a1a18;margin-bottom:3px;letter-spacing:0.03em;}\n    .supplier-meta{font-size:9px;color:#6b6b66;margin-top:2px;}\n  ";

  var html="<!DOCTYPE html><html lang=\"pl\"><head><meta charset=\"UTF-8\"><title>Zam\xf3wienie karnisz\xf3w \u2014 "+client.name+"</title>"+pdfStyles().replace("</style>",extraStyles+"</style>")+"</head><body>"
    +"<div class=\"header\"><div><div class=\"logo-text\">PORTER<br>DESIGN</div><div class=\"logo-sub\">Dekoracje okienne</div></div>"
    +"<div style=\"text-align:right\"><div style=\"font-size:18px;font-weight:700\">Zam\xf3wienie karnisz\xf3w / szyn</div>"
    +"<div style=\"font-size:9px;color:#6b6b66;margin-top:4px\">Klient: <strong>"+client.name+"</strong> &nbsp;|&nbsp; Data: "+dateStr+" &nbsp;|&nbsp; Dostawc\xf3w: "+activeSups.length+"</div></div></div>"
    +supplierSections
    +"<div class=\"footer\" style=\"margin-top:8mm\"><span>"+SELLER.name+" | "+SELLER.city+"</span><span>Generowano: "+dateStr+"</span></div>"
    +"</body></html>";

  openPDFWindow(html,"zamowienie-karnisz");
}

function generateFabricOrderPDF(client){
  var rows=buildFabricRows(client);
  if(!rows.length){alert("Brak tkanin do zamówienia.");return;}
  var now=new Date();var dateStr=now.toLocaleDateString("pl-PL");

  // Group rows by supplier (skip manual fabrics with no meters)
  var bySupplier={};
  rows.forEach(function(r){
    if(!r.metry||r.metry<=0)return; // skip zero-meter rows
    var key=r.prod||"Inny";
    if(key==="-")return; // skip manual/custom fabrics with no supplier
    if(!bySupplier[key])bySupplier[key]=[];
    bySupplier[key].push(r);
  });
  var suppliers=Object.keys(bySupplier).sort();

  // Build one section per supplier
  var supplierSections=suppliers.map(function(sup,si){
    var supRows=bySupplier[sup];
    var tableRows=supRows.map(function(r){
      return [
        "<strong>"+r.fabName+"</strong>",
        r.width?r.width+"cm":"-",
        r.metry.toFixed(2).replace(".",",")+" mb",
        r.rooms.join("; ")
      ];
    });
    var totalMetry=supRows.reduce(function(a,r){return a+r.metry;},0);
    tableRows.push(["<strong>RAZEM</strong>","","<strong>"+totalMetry.toFixed(2).replace(".",",")+" mb</strong>",""]);

    var tableHTML=makeTableHTML(
      ["Tkanina","Szer. belki","Ilość (mb)","Przeznaczenie"],
      tableRows,
      "Pozycje do zamówienia"
    );

    var pageBreak=si>0?'<div style="page-break-before:always;padding-top:10mm;"></div>':"";

    return pageBreak+`
    <div class="supplier-header">
      <div class="supplier-name">${sup}</div>
      <div class="supplier-meta">Zamawiający: <strong>${SELLER.name}</strong>  |  Tel.: ${SELLER.tel}  |  E-mail: ${SELLER.email}</div>
      <div class="supplier-meta">Klient końcowy: <strong>${client.name}</strong>${client.addr?" — "+client.addr:""}  |  Data: ${dateStr}</div>
    </div>
    ${tableHTML}

// ── WYCENA UPROSZCZONA PDF ─────────────────────────────────────────────────
function generateSimplifiedPDF(client,comm){
  comm=comm||0;
  if(!(client.rooms||[]).length){alert("Brak pomieszczeń.");return;}
  var now=new Date();
  var dateStr=now.toLocaleDateString("pl-PL");
  var validDate=new Date(now.getTime()+30*24*60*60*1000);
  var validStr=validDate.toLocaleDateString("pl-PL");
  var offerNo=getPDFOfferNumber(client);

  function calcProd(p){
    var pfc=(p.type==="zaslona"||p.type==="firana")?mg(p,{panels:getPanelsForProd(p)}):p;
    var base=p.mp!=null?p.mp:(calc(pfc).total||0);
    return comm>0?base*(1+comm):base;
  }

  // Buduj wiersze: grupuj per pomieszczenie → per typ produktu
  var roomSections="";
  var grandTotal=0;

  (client.rooms||[]).forEach(function(room){
    if(!(room.windows||[]).length)return;
    // Zbierz wszystkie produkty z tego pomieszczenia pogrupowane po typie
    var typeTotals={};
    var roomTotal=0;
    (room.windows||[]).forEach(function(w){
      (w.products||[]).forEach(function(p){
        var total=calcProd(p);
        if(!total)return;
        var lbl=(PROD_TYPES.find(function(t){return t.id===p.type;})||{label:p.type}).label;
        if(!typeTotals[lbl])typeTotals[lbl]=0;
        typeTotals[lbl]+=total;
        roomTotal+=total;
      });
    });
    if(!roomTotal)return;
    grandTotal+=roomTotal;

    var rows="";
    Object.keys(typeTotals).forEach(function(lbl){
      rows+="<tr><td style=\"padding:7px 10px;font-size:11px;color:#333;\">"+lbl+"</td><td style=\"padding:7px 10px;text-align:right;font-size:11px;font-weight:600;color:#333;\">"+roundTo10(typeTotals[lbl])+" zł</td></tr>";
    });
    // Łącznie dla pomieszczenia
    rows+="<tr style=\"background:#f5ede0;\"><td style=\"padding:8px 10px;font-size:11px;font-weight:700;color:#8B5E3C;\">Łącznie "+room.name+"</td><td style=\"padding:8px 10px;text-align:right;font-size:12px;font-weight:700;color:#8B5E3C;\">"+roundTo10(roomTotal)+" zł</td></tr>";

    roomSections+="<div style=\"margin-bottom:10mm;\"><div style=\"font-size:13px;font-weight:700;color:#8B5E3C;letter-spacing:0.04em;text-transform:uppercase;padding:8px 10px;background:#fdf6ef;border-left:3px solid #8B5E3C;margin-bottom:0;\">"+room.name+"</div><table style=\"width:100%;border-collapse:collapse;border:1px solid #ede3d9;\"><tbody>"+rows+"</tbody></table></div>";
  });

  if(!grandTotal){alert("Brak pozycji do wyceny.");return;}

  var html="<!DOCTYPE html><html lang=\"pl\"><head><meta charset=\"UTF-8\"><title>Wycena Uproszczona — "+client.name+"</title>"+pdfStyles()+"</head><body>"
    +"<div style=\"text-align:center;margin-bottom:8mm;line-height:0;\"><img src=\""+BANNER_PDF_G+"\" style=\"width:520px;max-width:100%;height:auto;display:inline-block;\" alt=\"\"/></div>"
    +"<div class=\"header\" style=\"padding-top:2mm;\">"
    +"<div><img src=\""+LOGO_PDF_G+"\" style=\"height:54px;width:auto;\" alt=\"Porter Design\"/></div>"
    +"<div style=\"text-align:right\"><div style=\"font-size:18px;font-weight:700\">Wycena Uproszczona</div>"
    +"<div style=\"font-size:10px;color:#8B5E3C;font-weight:600;margin-top:2px;\">"+client.name+"</div>"
    +"<div style=\"font-size:9px;color:#6b6b66;margin-top:4px\">Data: "+dateStr+" &nbsp;|&nbsp; Ważne do: "+validStr+"</div></div></div>"
    +"<div style=\"font-size:9px;color:#888;margin:0 0 6mm;padding-bottom:4mm;border-bottom:1px solid #ede3d9;\">Dokument poglądowy — orientacyjna wycena z podziałem na pomieszczenia. Szczegółowe zestawienie w ofercie właściwej.</div>"
    +roomSections
    +"<div style=\"margin-top:6mm;padding:12px 16px;background:#8B5E3C;border-radius:8px;display:flex;justify-content:space-between;align-items:center;\">"
    +"<span style=\"font-size:13px;color:#fff;letter-spacing:0.04em;\">Łącznie cała realizacja</span>"
    +"<span style=\"font-size:20px;font-weight:700;color:#fff;\">"+roundTo10(grandTotal)+" zł</span></div>"
    +"<div class=\"notes\" style=\"margin-top:6mm;\"><strong>Montaż i stylizacja tkanin wynosi 10% wartości zamówienia.</strong></div>"
    +"<div class=\"sign-block\">"
    +"<div class=\"sign\">Wystawiła<br><strong>Paulina Porter</strong></div>"
    +"<div class=\"sign\">Akceptacja klienta</div>"
    +"</div>"
    +"<div class=\"footer\"><span>"+SELLER.name+" | "+SELLER.city+"</span><span>"+offerNo+"</span></div>"
    +"</body></html>";

  openPDFWindow(html, "wycena-uproszczona-"+offerNo);
}

function ProdCard(p){
  var prod=p.prod,c=prod.c||{},par=prod.par||{};
  function sc(k,v){p.onChange(mg(prod,{c:mg(c,{[k]:v})}));}
  function tc(k,a,b){a=a||"nie";b=b||"tak";sc(k,c[k]===b?a:b);}
  function sp(k,v){p.onChange(mg(prod,{par:mg(par,{[k]:+v||0})}));}
  function sf(f){p.onChange(mg(prod,{fabName:f.name,fabP:f.brutto,fabW:f.width,fabMan:null}));}
  function sfm(v){p.onChange(mg(prod,{fabName:null,fabP:null,fabW:prod.fabManW||null,fabMan:v}));}
  function sfmW(v){p.onChange(mg(prod,{fabManW:v,fabW:v}));}

  // --- Curtain split logic ---
  // split: "left" | "right" | "equal" | "unequal"
  var split = c.split||"unequal";
  var leftW = c.leftW||0;
  var rightW = c.rightW||0;
  var totalW = par.wCm||0;

  // If split is "unequal": entering left auto-calculates right
  function setLeftW(v){
    var lv = +v||0;
    var rv = totalW>0 ? Math.max(0, totalW-lv) : 0;
    p.onChange(mg(prod,{c:mg(c,{leftW:lv, rightW:totalW>0?rv:c.rightW||0})}));
  }
  function setRightW(v){
    var rv = +v||0;
    var lv = totalW>0 ? Math.max(0, totalW-rv) : 0;
    p.onChange(mg(prod,{c:mg(c,{rightW:rv, leftW:totalW>0?lv:c.leftW||0})}));
  }
  function onTotalWChange(v){
    var tw = +v||0;
    sp("wCm", v);
    // Recalculate panels based on split
    if(split==="unequal" && tw>0 && c.leftW>0){
      var newR = Math.max(0, tw - c.leftW);
      p.onChange(mg(prod,{par:mg(par,{wCm:tw}), c:mg(c,{rightW:newR})}));
    }
  }

  
  // Override prod panels for calc
  var prodForCalc = mg(prod, {panels: getPanelsForProd(prod)});

  var res=calc(prodForCalc),total=res.total,lines=res.lines,warn=res.warn;

    }});
  });

  var s3=useState(null),curClientId=s3[0],setCurClientId=s3[1];
  var s4=useState(null),curRoomId=s4[0],setCurRoomId=s4[1];
  var s5=useState(null),curWin=s5[0],setCurWin=s5[1];
  var s6=useState(false),showClientModal=s6[0],setShowClientModal=s6[1];
  var s7=useState(false),showRoomModal=s7[0],setShowRoomModal=s7[1];
  var s8=useState(false),showWinModal=s8[0],setShowWinModal=s8[1];
  var s11=useState(false),showSewingModal=s11[0],setShowSewingModal=s11[1];

  var s14b=useState(false),showEmailModal=s14b[0],setShowEmailModal=s14b[1];
  var s9=useState(true),loading=s9[0],setLoading=s9[1];
  var s10=useState(null),saveStatus=s10[0],setSaveStatus=s10[1];

  var curClient=clients.find(function(cl){return cl.id===curClientId;})||null;
  var curRoom=curClient?(curClient.rooms||[]).find(function(r){return r.id===curRoomId;}):null;

  function wt(w){return(w.products||[]).reduce(function(a,p){var pfc=(p.type==="zaslona"||p.type==="firana")?mg(p,{panels:getPanelsForProd(p)}):p;return a+(p.mp!=null?p.mp:(calc(pfc).total||0));},0);}
  function rt(r){return(r.windows||[]).reduce(function(a,w){return a+wt(w);},0);}
  function clientTotal(cl){return(cl.rooms||[]).reduce(function(a,r){return a+rt(r);},0);}

  // Załaduj klientów z Supabase przy starcie
  React.useEffect(function(){
    sbApi.getClients().then(function(data){
      setClients(data||[]);
      setLoading(false);
    }).catch(function(e){
      console.error("Błąd ładowania:",e);
      setLoading(false);
    });
  },[]);

  // Zapisz zmiany w Supabase z debounce
  function saveClientToSb(id, data){
    setSaveStatus("saving");
    sbApi.updateClient(id, data).then(function(){
      setSaveStatus("ok");
      setTimeout(function(){setSaveStatus(null);},1500);
    }).catch(function(e){
      console.error("Błąd zapisu:",e);
      setSaveStatus("error");
    });
  }

  function updateClient(id,fn){
    setClients(function(cs){
      var updated=cs.map(function(cl){return cl.id===id?fn(cl):cl;});
      var newCl=updated.find(function(cl){return cl.id===id;});
      if(newCl) saveClientToSb(id,{name:newCl.name,addr:newCl.addr,rooms:newCl.rooms});
      return updated;
    });
  }

  function addClient(name,addr){
    sbApi.addClient(name,addr).then(function(data){
      var newCl=data&&data[0]?data[0]:{id:Date.now(),name:name,addr:addr,rooms:[{id:1,name:"Salon",img:IMG_ROOM_SALON,windows:[]}]};
      setClients(function(cs){return cs.concat([newCl]);});
      setCurClientId(newCl.id);
      setScreen("rooms");
    }).catch(function(e){
      console.error("Błąd dodawania klienta:",e);
    });
  }

  function openClient(id){setCurClientId(id);setScreen("rooms");}
  function openRoom(id){setCurRoomId(id);setScreen("windows");}
  function openWin(w){setCurWin(JSON.parse(JSON.stringify(w)));setScreen("detail");}
  function newWin(name){setCurWin({id:Date.now(),name:name,products:[]});setScreen("detail");}

  function addRoom(name,img){
    var newRoom={id:Date.now(),name:name,img:img||null,windows:[]};
    updateClient(curClientId,function(cl){return mg(cl,{rooms:(cl.rooms||[]).concat([newRoom])});});
  }

  function saveWin(){
    updateClient(curClientId,function(cl){
      var newRooms=(cl.rooms||[]).map(function(r){
        if(r.id!==curRoomId)return r;
        var found=(r.windows||[]).find(function(w){return w.id===curWin.id;});
        var newWins=found?(r.windows||[]).map(function(w){return w.id===curWin.id?curWin:w;}):(r.windows||[]).concat([curWin]);
        return mg(r,{windows:newWins});
      });
      return mg(cl,{rooms:newRooms});
    });
    setScreen("windows");
  }

  function addProd(){setCurWin(function(w){return mg(w,{products:(w.products||[]).concat([{id:Date.now(),type:"zaslona",c:{},par:{},panels:[{side:"Zasłona lewa",w:""}],mp:null,fabName:null,fabP:null,fabW:null,fabMan:null}])});});}
  function updProd(i,p){setCurWin(function(w){return mg(w,{products:(w.products||[]).map(function(x,j){return j===i?p:x;})});});}
  function remProd(i){setCurWin(function(w){return mg(w,{products:(w.products||[]).filter(function(_,j){return j!==i;})});});}
  function dupProd(i){setCurWin(function(w){var prods=w.products||[];var src=prods[i];var copy=mg(src,{id:Date.now()});var next=prods.slice(0,i+1).concat([copy]).concat(prods.slice(i+1));return mg(w,{products:next});});}

function ModalClientEmail(p){
  var useState=React.useState,useRef=React.useRef;
  var client=p.client||{};
  var sr1=useState(false),copied=sr1[0],setCopied=sr1[1];
  var sr2=useState("rozmowy"),kontekst=sr2[0],setKontekst=sr2[1];
  var emailRef=useRef(null);

  var total=roundTo10((client.rooms||[]).reduce(function(a,r){return a+(r.windows||[]).reduce(function(b,w){return b+(w.products||[]).reduce(function(c,prod){var pfc=(prod.type==="zaslona"||prod.type==="firana")?mg(prod,{panels:getPanelsForProd(prod)}):prod;return c+(prod.mp!=null?prod.mp:(calc(pfc).total||0));},0);},0);},0));
  var zaliczka=roundTo10(total*0.5);

  var konteksty=["rozmowy","spotkania","wysłanych wymiarów"];

  function buildMail(){
    var k=kontekst;
    var mail="Dzień dobry,\n\n"
      +"W nawiązaniu do "+k+", przesyłam w załączeniu PDF z uproszczoną, przybliżoną wyceną "+(client.gender==="male"?"Pana":"Pani")+" zamówienia."
      +(total>0?"\n\nOrientacyjna wartość realizacji: "+total+" zł brutto\n(zaliczka 50% = "+zaliczka+" zł)":"")
      +"\n\nCzas realizacji: ok. 4 tygodnie od akceptacji i wpłaty zaliczki w wysokości 50% wartości zamówienia."
      +"\n\nChętnie przyjadę z wzornikami tkanin, aby dobrać kolor i fakturę do wnętrza."
      +"\n\nKoszt pomiaru z dojazdem wynosi 250 PLN i jest w całości odliczany od wartości zamówienia przy realizacji."
      +"\n\nPozdrawiam serdecznie,\nPaulina Porter\nPorter Design\nTel.: "+SELLER.tel+"\nE-mail: "+SELLER.email;
    return mail;
  }

  var mailText=buildMail();

  function copyMail(){
    var el=emailRef.current;
    if(!el)return;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(mailText).then(function(){setCopied(true);setTimeout(function(){setCopied(false);},2500);});
    } else {
      el.select();document.execCommand("copy");setCopied(true);setTimeout(function(){setCopied(false);},2500);
    }
  }

        ce("button",{onClick:p.onClose,style:{border:"none",background:"none",cursor:"pointer",fontSize:22,color:"var(--t3)",lineHeight:1,padding:"0 4px"}},"\u00d7")
      ),
      ce("div",{style:{marginBottom:14}},
        ce("div",{style:{fontSize:11,fontWeight:600,color:"var(--t3)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}},"Nawiązanie do:"),
        ce("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
          konteksty.map(function(k){
            return ce("button",{key:k,onClick:function(){setKontekst(k);},style:{padding:"8px 14px",borderRadius:8,border:"1.5px solid "+(kontekst===k?"var(--gr)":"var(--bd2)"),background:kontekst===k?"var(--grl)":"transparent",color:kontekst===k?"var(--grd)":"var(--t2)",fontSize:12,fontWeight:kontekst===k?700:400,cursor:"pointer"}},k);
          })
        )
      ),
      ce("textarea",{ref:emailRef,value:mailText,readOnly:true,style:{width:"100%",height:280,padding:"14px",borderRadius:12,border:"1px solid var(--bd2)",background:"var(--bg2)",color:"var(--t1)",fontSize:12,lineHeight:1.7,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box",outline:"none"}}),
      ce("div",{style:{display:"flex",gap:10,marginTop:14}},
        ce("button",{onClick:copyMail,style:{flex:1,padding:"14px",borderRadius:12,border:"none",background:copied?"var(--grd)":"var(--gr)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}},copied?"\u2713 Skopiowano!":"\uD83D\uDCCB Kopiuj do schowka"),

        "Wycena: "+total+" zł  |  Zaliczka 50%: "+zaliczka+" zł"
      ):null
    )
  );
}

  function buildSystemPrompt(){

      "=== DOSTEPNE TKANINY (nazwa:cena) ===\n"+
      fabList+"\n\n"+

      "=== DOSTEPNE TYPY ZALUZJI ===\n"+
      jzList+"\n\n"+

      "=== FORMAT ODPOWIEDZI ===\n"+
      "Zwroc TYLKO poprawny JSON (bez backticks, bez komentarzy, bez zadnego innego tekstu):\n"+
      '{"clientName":"Jan Kowalski","addr":"","rooms":[{"name":"Salon","windows":[{"name":"Okno 1","products":[]}]}]}\n\n'+

      "=== TYPY PRODUKTOW i ich pola ===\n"+
      "1. ZASLONA/FIRANA:\n"+

      "  - type: zaslona lub firana\n"+
      "  - par.wCm: szerokosc okna w cm (pelna szerokosc, nie pol)\n"+
      "  - par.hCm: wysokosc w cm\n"+
      "  - c.mars: mnoznik – zakladka='2.3', transparentna='2.0', firana='2.5'-'3.0'\n"+
      "  - c.sz: 'flex' (standard) lub 'wave'\n"+
      "  - c.split: 'equal'=komplet rowny, 'left'=tylko lewa, 'right'=tylko prawa, 'unequal'=komplet nierowny\n"+
      "  - fabName: DOKLADNA nazwa tkaniny z listy powyzej (jesli klient podal) lub null jesli nie podano\n\n"+

      "2. ZALUZJA:\n"+
      '{"type":"zaluzja","par":{"wCm":100,"lCm":150},"c":{"jt":"ba50"}}\n'+
      "  - par.wCm: szerokosc w cm, par.lCm: dlugosc/wysokosc w cm\n"+
      "  - c.jt: kod z listy zaluzji powyzej (al25, al35, ba35, ba50, ba65, bs35, bs50, bs65)\n"+
      "  - Jesli klient pyta o 'drewniane 50mm' -> ba50 lub bs50; 'aluminium' -> al25; 'bamboo' -> ba50\n\n"+

  function callAI(sys,userContent,ok,fail,history){

      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",

    }).then(function(r){return r.json();}).then(function(d){
      if(d.error){fail(d.error.message||"Blad API");return;}

  // ── PRZELICZ CENY przez calc() ──────────────────────────────────────────
  function enrichWithPrices(data){
    var total=0;
    var roomSummary=[];
    (data.rooms||[]).forEach(function(room){
      var roomTotal=0;
      var winSummary=[];
      (room.windows||[]).forEach(function(win){
        var winTotal=0;
        var prodSummary=[];
        (win.products||[]).forEach(function(prod){
          // Uzupelnij fabP i fabW z tablicy FABRICS
          if(prod.fabName){
            var fab=FABRICS.find(function(f){return f.name===prod.fabName;});
            if(fab){prod.fabP=fab.brutto;prod.fabW=fab.width||300;}
          }
          // Uzupelnij panels dla zaslon/firan
          var prodForCalc=prod;
          if(prod.type==="zaslona"||prod.type==="firana"){
            var panels=getPanelsForProd(prod);
            prodForCalc=Object.assign({},prod,{panels:panels});
          }
          var res=calc(prodForCalc);
          prod.mp=res.total||0;
          winTotal+=prod.mp;
          var typeLabel={zaslona:"Zasłona",firana:"Firana",zaluzja:"Żaluzja",roleta:"Roleta",szyna:"Szyna",karnisz:"Karnisz"}[prod.type]||prod.type;
          var fabInfo=prod.fabName?" ("+prod.fabName+")":"";
          var warnInfo=res.warn?" ⚠ "+res.warn:"";
          prodSummary.push({
            label:typeLabel+fabInfo,
            price:prod.mp,
            lines:res.lines||[],
            warn:res.warn||null
          });
        });
        roomTotal+=winTotal;
        winSummary.push({name:win.name,total:winTotal,products:prodSummary});
      });
      total+=roomTotal;
      roomSummary.push({name:room.name,total:roomTotal,windows:winSummary});
    });
    return{rooms:roomSummary,total:total,data:data};
  }

  function doAnalyze(){
    if(!inputText.trim()&&!attachments.length)return;
    setLoading(true);setError(null);setParsed(null);setCalcResult(null);
    setSaved(false);setSavedClient(null);setEmailText(null);

    var userContent;
    if(attachments.length){
      var parts=[];
      attachments.forEach(function(att){
        parts.push({type:"image",source:{type:"base64",media_type:att.mediaType,data:att.data}});
      });
      if(inputText.trim())parts.push({type:"text",text:inputText.trim()});
      else parts.push({type:"text",text:"Przeanalizuj ten rzut mieszkania i wyodrebnij pomieszczenia oraz okna."});
      userContent=parts;
    }else{
      userContent=inputText.trim();
    }

    var msgText=inputText.trim()||"[obrazek]";
    var newHistory=chatHistory.concat([{role:"user",content:userContent,display:msgText}]);
    setChatHistory(newHistory);
    setInputText("");setAttachments([]);

    callAI(buildSystemPrompt(),userContent,
      function(jsonTxt){
        var data;
        try{
          var clean=jsonTxt.replace(/```json|```/g,"").trim();
          data=JSON.parse(clean);
        }catch(e){
          setChatHistory(function(h){return h.concat([{role:"assistant",content:jsonTxt,display:jsonTxt}]);});
          setError(null);setLoading(false);return;
        }
        var result=enrichWithPrices(data);

        setCalcResult(result);
        var aiMsg="\u2705 Wycena gotowa! \u0141\u0105czna kwota: "+roundTo10(result.total)+" z\u0142. Mo\u017cesz doprecyzowa\u0107 szczeg\u00f3\u0142y lub zada\u0107 pytanie poni\u017cej.";
        setChatHistory(function(h){return h.concat([{role:"assistant",content:jsonTxt,display:aiMsg,isQuote:true}]);});
        setLoading(false);
      },
      function(e){setError(e);setLoading(false);}
    ,newHistory.map(function(m){return{role:m.role,content:m.content};}));
  }

  function doChat(){
    if(!chatInput.trim()||loading)return;
    var msg=chatInput.trim();
    setChatInput("");

    setChatHistory(newHistory);
    setLoading(true);setError(null);

    var ctxSys=buildSystemPrompt()+

    callAI(ctxSys,msg,
      function(txt){
        var trimmed=txt.replace(/```json|```/g,"").trim();

          if(prev.length>=3)return prev;
          return prev.concat([{name:file.name,mediaType:file.type,data:d.slice(c+1)}]);
        });
      };
      reader.readAsDataURL(file);
    });
  }

              style:{width:"100%",padding:"12px 14px",fontSize:13,border:"1.5px solid var(--bd2)",borderRadius:10,background:"var(--bg)",color:"var(--t1)",fontFamily:"inherit",lineHeight:1.6,resize:"vertical",outline:"none",boxSizing:"border-box"}}),
            ce("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
              Btn(emailCopied?"\u2713 Skopiowano!":"\uD83D\uDCCB Kopiuj maila",copyEmail,false,emailCopied),
              Btn("\uD83D\uDD04 Generuj ponownie",doEmail,emailLoading,false)
            )
          ):null
        )
      ):null,

      // Błąd
      error?ce("div",{style:{padding:"12px 14px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10,fontSize:12,color:"#b91c1c",whiteSpace:"pre-wrap"}},"\u26A0\uFE0F "+error):null,

      // ── INPUT CZATU (na dole, zawsze) ────────────────────────────────────
      ce("div",{style:{marginTop:"auto",paddingTop:12,borderTop:chatHistory.length>0?"1px solid var(--bd2)":"none",display:"flex",flexDirection:"column",gap:8}},
        chatHistory.length>0&&attachments.length===0?ce("button",{
          onClick:function(){fileRef.current&&fileRef.current.click();},
          style:{alignSelf:"flex-start",border:"1px dashed var(--bd2)",background:"var(--bg2)",color:"var(--t3)",fontSize:11,borderRadius:8,padding:"4px 10px",cursor:"pointer"}
        },"\uD83D\uDDBC\uFE0F Za\u0142\u0105cz obrazek"):null,
        attachments.length>0?ce("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          attachments.map(function(att,i){
            return ce("div",{key:i,style:{display:"flex",alignItems:"center",gap:4,background:"var(--bg3)",borderRadius:7,padding:"3px 8px",fontSize:11}},
              ce("img",{src:"data:"+att.mediaType+";base64,"+att.data,style:{width:24,height:24,objectFit:"cover",borderRadius:3}}),
              ce("span",{style:{maxWidth:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--t1)"}},att.name),
              ce("button",{onClick:function(e){e.stopPropagation();removeAtt(i);},style:{border:"none",background:"none",cursor:"pointer",color:"var(--t3)",fontSize:14,lineHeight:1}},"\u00D7")
            );
          }),
          ce("input",{ref:fileRef,type:"file",accept:"image/*",multiple:true,style:{display:"none"},onChange:function(ev){handleFiles(ev.target.files);}})
        ):ce("input",{ref:fileRef,type:"file",accept:"image/*",multiple:true,style:{display:"none"},onChange:function(ev){handleFiles(ev.target.files);}}),
        ce("div",{style:{display:"flex",gap:8,alignItems:"flex-end"}},
          ce("textarea",{
            value:chatHistory.length===0?inputText:chatInput,
            onChange:function(ev){chatHistory.length===0?setInputText(ev.target.value):setChatInput(ev.target.value);},
            onKeyDown:function(ev){
              if(ev.key==="Enter"&&!ev.shiftKey){
                ev.preventDefault();
                if(chatHistory.length===0)doAnalyze();
                else doChat();
              }
            },
            placeholder:chatHistory.length===0
              ?"Wklej maila od klienta lub opisz zapytanie...\n\n(Enter aby wys\u0142a\u0107, Shift+Enter nowa linia)"
              :"Zadaj pytanie, doprecyzuj szczeg\u00f3\u0142y lub popro\u015b o zmian\u0119...\n(Enter aby wys\u0142a\u0107)",
            rows:chatHistory.length===0?5:3,
            style:{flex:1,padding:"10px 13px",fontSize:13,border:"1.5px solid var(--bd2)",borderRadius:10,background:"var(--bg)",color:"var(--t1)",resize:"none",fontFamily:"inherit",lineHeight:1.55,outline:"none",boxSizing:"border-box"}
          }),
          ce("div",{style:{display:"flex",flexDirection:"column",gap:6}},
            ce("button",{
              onClick:chatHistory.length===0?doAnalyze:doChat,
              disabled:loading||(chatHistory.length===0?(!inputText.trim()&&!attachments.length):!chatInput.trim()),
              style:{width:42,height:42,borderRadius:10,border:"none",background:"var(--t1)",color:"#fff",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                opacity:(loading||(chatHistory.length===0?(!inputText.trim()&&!attachments.length):!chatInput.trim()))?0.35:1,transition:"opacity 0.15s"}
            },loading?"\u23F3":"\u27A4"),
            chatHistory.length>0?ce("button",{
              onClick:reset,
              title:"Nowa rozmowa",
              style:{width:42,height:42,borderRadius:10,border:"1px solid var(--bd2)",background:"var(--bg2)",color:"var(--t3)",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}
            },"\uD83D\uDDD1\uFE0F"):null
          )
        )
      )
    )
  ));
}

ReactDOM.createRoot(document.getElementById("app-mount")).render(ce(App,{}));
})();
</script>
</body>
</html>
