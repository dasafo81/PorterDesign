        ks=dekro?+(z*sv2).toFixed(2):+(z*szycie).toFixed(2);
      }
      koszt=kt+ks;total+=koszt;
      lines.push(pn.side+" "+pw+"cm \u00b7 "+z+"mb \u2192 "+koszt.toFixed(2).replace(".",",")+" z\u0142");
    });
  }else if(p.type==="zaluzja"){
    var wCm=par.wCm||0,lCm=par.lCm||0;
    var jt=c.jt||"al25";
    if(!wCm||!lCm)return{total:0,lines:[],warn:null};
    var res=jzLookup(jt,wCm,lCm);
    if(!res)return{total:0,lines:[],warn:"Wymiary poza zakresem cennika."};
    total=res.price;
    // dopłaty
    if(c.bezinw==="tak"){
      var bDop=jt==="al50"?85.03:57.12;
      if(jt==="al25"||jt==="al35")bDop=74.73;
      total+=bDop;
      lines.push("Monta\u017c bezinwazyjny +"+bDop.toFixed(2)+" z\u0142");
    }
    lines.push(JZ_LABELS[jt]+" "+wCm+"\xd7"+lCm+"cm \u2192 "+res.price+" z\u0142");
    // strefy
    var pow=(wCm/100)*(lCm/100);
    var z=JZ_ZONES[jt]||{};
    if(z.blue&&pow>=z.blue)warn="Strefa niebieska ("+pow.toFixed(2)+"m\xb2) \u2014 wymagana obs\u0142uga elektryczna.";
    else if(z.red&&pow>=z.red)warn="Strefa czerwona ("+pow.toFixed(2)+"m\xb2) \u2014 ograniczona gwarancja.";
  }else if(p.type==="roleta"){
    var wCm=par.wCm||0,hCm=par.hCm||0;
    if(!wCm||!hCm)return{total:0,lines:[],warn:null};
    var rt=c.rt||"city",rtk2=+(c.rtk2||"160"),rb=c.rb==="tak"?11:0;
    var tkan=fabP!=null?fabP:160;
    var pow=parseFloat(((wCm/100)*(hCm/100)).toFixed(3));
    var rr;
    if(rt==="city"){rr=lookup(wCm,RCITY);total=parseFloat((rr.p*2+rb).toFixed(2))+parseFloat((pow*(200+tkan)).toFixed(2));}
    else if(rt==="duo"){rr=lookup(wCm,RDUO);total=parseFloat((rr.p*2+rb).toFixed(2))+parseFloat((pow*280).toFixed(2))+parseFloat((pow*(200+rtk2)).toFixed(2));}
    else{rr=lookup(wCm,REL);total=parseFloat((rr.p*2).toFixed(2))+parseFloat((pow*(200+tkan)).toFixed(2));}
    lines.push("Roleta "+rt+" "+wCm+"\xd7"+hCm+"cm \xb7 "+pow+"m\xb2");
  }else if(p.type==="szyna"){
    var lenCm=par.len||0,arc=par.arc||0,pts=par.pts||0;
    if(!lenCm)return{total:0,lines:[],warn:null};
    var lenMb=lenCm/100;
    var baz;
    if(c.ks==="wave"){var rw=lookup(lenCm,KW[c.kk||"biala"]);baz=rw.p;}
    else baz=parseFloat((lenMb*80).toFixed(2));
    total=baz+parseFloat((arc*100).toFixed(2))+parseFloat((pts*60).toFixed(2));
    lines.push("KAES "+(c.ks||"flex")+" "+lenCm+"cm ("+lenMb.toFixed(2)+"mb)");
    if(c.km==="sciana")warn="\u015acienny \u2014 dolicz uchwyty \u015bcienne.";
  }else if(p.type==="karnisz"){
    var lenK=par.len||0,pt=par.pt||0,arc=par.arc||0;
    if(!lenK)return{total:0,lines:[],warn:null};
    var st=c.km==="universal"?KUNIV:KSLIM;
    var rk=lookup(lenK,st);
    total=rk.p+(KN[c.kn||"am75"]||0)+(KP[c.kp||"brak"]||0)+pt*210+arc*318;
    lines.push("Karnisz "+(c.km||"slim").toUpperCase()+" do "+rk.k+"cm");
  }
  return{total:total,lines:lines,warn:warn};
}

      ]}),
      ce(Chips,{items:nap.map(function(x){return ce(Chip,{key:x.v,label:x.l,active:(!c.kn&&x.v==="am75")||c.kn===x.v,onClick:function(){sc("kn",x.v);}});})}),
      ce(Chips,{items:pil.map(function(x){return ce(Chip,{key:x.v,label:x.l,active:(!c.kp&&x.v==="brak")||c.kp===x.v,onClick:function(){sc("kp",x.v);}});})})
    );
  }else{
    form=ce("div",{style:{fontSize:12,color:"var(--t2)"}},"Cennik wkr\xf3tce.");
  }

  return ce("div",{style:{background:"var(--bg)",border:"0.5px solid var(--bd3)",borderRadius:10,overflow:"hidden",marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}},
    ce("div",{style:{padding:"8px 12px",background:"var(--bg2)",display:"flex",alignItems:"center",gap:8,borderBottom:"0.5px solid var(--bd3)"}},
      ce("span",{style:{fontSize:13,fontWeight:500,color:"var(--t1)",flex:1}},lbl+(prod.fabName?" \xb7 "+prod.fabName:"")),
      ce("span",{style:{fontSize:12,fontWeight:600,color:"var(--gr)"}},eff?Math.round(eff)+" z\u0142":""),
      ce("button",{onClick:p.onRemove,style:{border:"none",background:"none",cursor:"pointer",fontSize:16,color:"var(--t3)"}},"\xd7")
    ),
    ce("div",{style:{padding:"11px 12px",display:"flex",flexDirection:"column",gap:8}},
      ce(Chips,{items:typeChips}),
      form,
      warn?ce("div",{style:{background:"var(--wb)",border:"0.5px solid var(--wbd)",borderRadius:6,padding:"5px 9px",fontSize:11,color:"var(--wt)"}},warn):null,
      (total>0&&prod.mp==null)?ce("div",{style:{background:"var(--grl)",border:"0.5px solid var(--grm)",borderRadius:8,padding:"8px 10px"}},
        lines.map(function(l,i){return ce("div",{key:i,style:{fontSize:12,color:"var(--gr)"}},l);}),
        ce("div",{style:{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:600,color:"var(--grd)",marginTop:4,paddingTop:4,borderTop:"1px solid var(--grm)"}},
          ce("span",{},"Razem"),ce("span",{},total.toFixed(2).replace(".",",")+" z\u0142"))
      ):null,
      ce("div",{style:{display:"flex",alignItems:"center",gap:8,paddingTop:8,borderTop:"0.5px solid var(--bd3)"}},
        ce("label",{style:{fontSize:11,color:"var(--t2)",flex:1}},"W\u0142asna cena ko\u0144cowa:"),
        ce("input",{type:"number",value:prod.mp!=null?prod.mp:"",onChange:function(ev){p.onChange(mg(prod,{mp:ev.target.value===""?null:+ev.target.value}));},placeholder:"z\u0142",style:{width:80,padding:"4px 7px",fontSize:12,border:"0.5px solid var(--bd2)",borderRadius:6,background:"var(--bg)",color:"var(--t1)",textAlign:"right"}}),
        prod.mp!=null?ce("button",{onClick:function(){p.onChange(mg(prod,{mp:null}));},style:{border:"none",background:"none",cursor:"pointer",fontSize:11,color:"var(--t3)"}},"wyczy\u015b\u0107"):null
      )
    )
  );
}

// ── APP ────────────────────────────────────────────────────────────────────

var DEFAULT_ROOMS=[{id:1,name:"Salon",icon:"\ud83d\udecb\ufe0f",windows:[]}];

function App(){
  var s1=useState("home"),screen=s1[0],setScreen=s1[1];
  var s2=useState([]),clients=s2[0],setClients=s2[1];
  var s3=useState(null),curClientId=s3[0],setCurClientId=s3[1];
  var s4=useState(null),curRoomId=s4[0],setCurRoomId=s4[1];
  var s5=useState(null),curWin=s5[0],setCurWin=s5[1];
  var s6=useState(false),showClientModal=s6[0],setShowClientModal=s6[1];
  var s7=useState(false),showRoomModal=s7[0],setShowRoomModal=s7[1];
  var s8=useState(false),showWinModal=s8[0],setShowWinModal=s8[1];

  var curClient=clients.find(function(cl){return cl.id===curClientId;})||null;
  var curRoom=curClient?(curClient.rooms||[]).find(function(r){return r.id===curRoomId;}):null;

  function wt(w){return(w.products||[]).reduce(function(a,p){return a+(p.mp!=null?p.mp:(calc(p).total||0));},0);}
  function rt(r){return(r.windows||[]).reduce(function(a,w){return a+wt(w);},0);}
  function clientTotal(cl){return(cl.rooms||[]).reduce(function(a,r){return a+rt(r);},0);}
  function updateClient(id,fn){setClients(function(cs){return cs.map(function(cl){return cl.id===id?fn(cl):cl;});});}

  function addClient(name,addr){
    var newCl={id:Date.now(),name:name,addr:addr,rooms:DEFAULT_ROOMS.map(function(r){return mg(r,{id:Date.now()+Math.random(),windows:[]});})};
    setClients(function(cs){return cs.concat([newCl]);});
    setCurClientId(newCl.id);
    setScreen("rooms");
  }

  function openClient(id){setCurClientId(id);setScreen("rooms");}
  function openRoom(id){setCurRoomId(id);setScreen("windows");}
  function openWin(w){setCurWin(JSON.parse(JSON.stringify(w)));setScreen("detail");}
  function newWin(name){setCurWin({id:Date.now(),name:name,products:[]});setScreen("detail");}

  function addRoom(name){
    var icons={"salon":"\ud83d\udecb\ufe0f","sypialnia":"\ud83d\udecc\ufe0f","kuchnia":"\ud83c\udf73","gabinet":"\ud83d\udcda","pok\xf3j":"\ud83d\udecc\ufe0f","\u0142azienka":"\ud83d\udec1","jadalnia":"\ud83c\udf7d\ufe0f","hol":"\ud83d\udeaa","korytarz":"\ud83d\udeaa"};
    var k=Object.keys(icons).find(function(k){return name.toLowerCase().includes(k);});
    var newRoom={id:Date.now(),name:name,icon:icons[k]||"\ud83e\ufaa1",windows:[]};
    updateClient(curClientId,function(cl){return mg(cl,{rooms:(cl.rooms||[]).concat([newRoom])});});
  }

  function saveWin(){
    updateClient(curClientId,function(cl){
      var newRooms=(cl.rooms||[]).map(function(r){
        if(r.id!==curRoomId)return r;
        var found=(r.windows||[]).find(function(w){return w.id===curWin.id;});
        var newWins=found?(r.windows||[]).map(function(w){return w.id===curWin.id?curWin:w;}):(r.windows||[]).concat([curWin]);
        return mg(r,{windows:newWins});
      });
      return mg(cl,{rooms:newRooms});
    });
    setScreen("windows");
  }

  function addProd(){setCurWin(function(w){return mg(w,{products:(w.products||[]).concat([{id:Date.now(),type:"zaslona",c:{},par:{},panels:[],mp:null,fabName:null,fabP:null,fabW:null,fabMan:null}])});});}
  function updProd(i,p){setCurWin(function(w){return mg(w,{products:(w.products||[]).map(function(x,j){return j===i?p:x;})});});}
  function remProd(i){setCurWin(function(w){return mg(w,{products:(w.products||[]).filter(function(_,j){return j!==i;})});});}

  function Btn(label,onClick,primary){
    return ce("button",{onClick:onClick,style:{padding:"7px 15px",borderRadius:8,border:primary?"none":"0.5px solid var(--bd2)",background:primary?"var(--t1)":"transparent",color:primary?"#fff":"var(--t1)",fontSize:12,fontWeight:primary?600:400,cursor:"pointer",letterSpacing:primary?"0.04em":"0"}},label);
  }

  function BC(){
    var parts=[];
    function cr(label,oc){return ce("span",{key:label,onClick:oc,style:{cursor:oc?"pointer":"default",color:oc?"var(--t3)":"var(--t1)",fontWeight:oc?400:500,fontSize:12}},label);}
    function sep(i){return ce("span",{key:"s"+i,style:{color:"var(--bd1)",margin:"0 5px",fontSize:12}},"/");}
    parts.push(cr("Klienci",screen!=="home"?function(){setScreen("home");}:null));
    if(screen!=="home"&&curClient){parts.push(sep(1));parts.push(cr(curClient.name,screen!=="rooms"?function(){setScreen("rooms");}:null));}
    if((screen==="windows"||screen==="detail")&&curRoom){parts.push(sep(2));parts.push(cr(curRoom.name,screen==="detail"?function(){setScreen("windows");}:null));}
    if(screen==="detail"&&curWin){parts.push(sep(3));parts.push(cr(curWin.name,null));}
    if(screen==="sum"){parts.push(sep(4));parts.push(cr("Podsumowanie",null));}
    return ce("div",{style:{display:"flex",flexWrap:"wrap",alignItems:"center",marginBottom:"1.1rem",paddingBottom:"0.8rem",borderBottom:"0.5px solid var(--bd3)"}},parts);
  }

  var content=null;

  // ── HOME ──
  if(screen==="home"){
    var clientTiles=clients.map(function(cl){
      var total=clientTotal(cl);
      return ce("div",{key:cl.id,onClick:function(){openClient(cl.id);},
        style:{background:"var(--bg)",border:"0.5px solid var(--bd3)",borderRadius:10,padding:"14px 12px",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",transition:"box-shadow .15s"}},
        ce("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}},
          ce("div",null,
            ce("div",{style:{fontSize:13,fontWeight:500,color:"var(--t1)",marginBottom:2}},cl.name),
            cl.addr?ce("div",{style:{fontSize:11,color:"var(--t3)",marginBottom:4}},cl.addr):null
          ),
          ce("span",{style:{fontSize:10,color:"var(--t3)"}},"\u203a")
        ),
        total?ce("div",{style:{fontSize:12,fontWeight:600,color:"var(--gr)",marginTop:4}},Math.round(total)+" z\u0142"):null
      );
    });
    clientTiles.push(ce("div",{key:"add",onClick:function(){setShowClientModal(true);},
      style:{border:"0.5px dashed var(--bd2)",borderRadius:10,padding:"14px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:"var(--t3)"}},
      ce("span",{style:{fontSize:18,lineHeight:1}},"+"),
      ce("span",{style:{fontSize:12}},"Nowy klient")
    ));
    content=ce(Fragment,null,
      // Logo hero
      ce("div",{style:{textAlign:"center",padding:"2rem 0 1.5rem"}},
        ce("img",{src:LOGO_SRC,alt:"Porter Design",style:{width:120,height:"auto",opacity:0.92}}),
      ),
      ce("div",{style:{fontSize:10,fontWeight:600,color:"var(--t3)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}},"Klienci"+(clients.length?" ("+clients.length+")":"")),
      clients.length===0?ce("div",{style:{color:"var(--t3)",fontSize:12,marginBottom:12,lineHeight:1.6}},"Dodaj pierwszego klienta, aby rozpocz\u0105\u0107 wizyt\u0119."):null,
      ce("div",{style:{display:"flex",flexDirection:"column",gap:6,marginBottom:12}},clientTiles)
    );
  }

  // ── ROOMS ──
  else if(screen==="rooms"&&curClient){
    var rooms=curClient.rooms||[];
    var roomTiles=rooms.map(function(r){
      var rTotal=rt(r);
      return ce("div",{key:r.id,onClick:function(){openRoom(r.id);},
        style:{background:"var(--bg)",border:"0.5px solid var(--bd3)",borderRadius:10,padding:12,cursor:"pointer",display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}},
        ce("div",{style:{fontSize:22,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg2)",borderRadius:8}},r.icon),
        ce("div",{style:{flex:1}},
          ce("div",{style:{fontSize:13,fontWeight:500,color:"var(--t1)"}},r.name),
          ce("div",{style:{fontSize:11,color:"var(--t3)"}},(r.windows||[]).length+" okien")
        ),
        rTotal?ce("span",{style:{fontSize:12,fontWeight:600,color:"var(--gr)"}},Math.round(rTotal)+" z\u0142"):null,
        ce("span",{style:{color:"var(--t3)",fontSize:13}},"\u203a")
      );
    });
    content=ce(Fragment,null,
      ce("div",{style:{fontSize:10,fontWeight:600,color:"var(--t3)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}},"Pomieszczenia"),
      ce("div",{style:{display:"flex",flexDirection:"column",gap:6,marginBottom:12}},
        roomTiles,
        ce("div",{key:"add",onClick:function(){setShowRoomModal(true);},
          style:{border:"0.5px dashed var(--bd2)",borderRadius:10,padding:"12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:"var(--t3)"}},
          ce("span",{style:{fontSize:18,lineHeight:1}},"+"),ce("span",{style:{fontSize:12}},"Dodaj pomieszczenie")
        )
      ),
      ce("div",{style:{display:"flex",gap:8}},Btn("Podsumowanie \u2197",function(){setScreen("sum");},true))
    );
  }

  // ── WINDOWS ──
  else if(screen==="windows"&&curRoom){
    var winRows=(curRoom.windows||[]).map(function(w){
      var t=wt(w);
      var labels=(w.products||[]).map(function(p){return(PROD_TYPES.find(function(pt){return pt.id===p.type;})||{label:p.type}).label;}).join(", ");
      return ce("div",{key:w.id,onClick:function(){openWin(w);},
        style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"0.5px solid var(--bd3)",cursor:"pointer"}},
        ce("div",{style:{width:32,height:32,background:"var(--bg2)",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}},"\ud83e\ufaa1"),
        ce("div",{style:{flex:1}},
          ce("div",{style:{fontSize:13,fontWeight:500,color:"var(--t1)"}},w.name),
          ce("div",{style:{fontSize:11,color:"var(--t3)"}},labels||"\u2014")
        ),
        t?ce("span",{style:{fontSize:12,fontWeight:600,color:"var(--gr)"}},Math.round(t)+" z\u0142"):null,
        ce("span",{style:{color:"var(--t3)",fontSize:13}},"\u203a")
      );
    });
    content=ce(Fragment,null,
      ce("div",{style:{fontSize:10,fontWeight:600,color:"var(--t3)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}},curRoom.name+" \u2014 okna"),
      (curRoom.windows||[]).length===0?ce("div",{style:{color:"var(--t3)",fontSize:12,padding:"8px 0 12px"}},"Brak okien. Dodaj pierwsze."):null,
      ce("div",{style:{marginBottom:12}},winRows),
      Btn("+ Dodaj okno",function(){setShowWinModal(true);},false)
    );
  }

  // ── DETAIL ──
  else if(screen==="detail"&&curWin){
    var wtv=wt(curWin);
    content=ce(Fragment,null,
      ce("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
        ce("div",{style:{fontSize:14,fontWeight:500,color:"var(--t1)"}},curWin.name),
        (curWin.products||[]).length?ce("div",{style:{fontSize:15,fontWeight:600,color:"var(--gr)"}},Math.round(wtv)+" z\u0142"):null
      ),
      (curWin.products||[]).map(function(p,i){return ce(ProdCard,{key:p.id,prod:p,onChange:function(np){updProd(i,np);},onRemove:function(){remProd(i);}});}),
      ce("button",{onClick:addProd,style:{padding:"8px 15px",borderRadius:8,border:"0.5px dashed var(--bd2)",background:"transparent",color:"var(--t2)",fontSize:12,cursor:"pointer",marginBottom:10,width:"100%"}},"+ Dodaj produkt"),
      (curWin.products||[]).length>0?ce("div",{style:{background:"var(--grl)",border:"0.5px solid var(--grm)",borderRadius:9,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
        ce("span",{style:{fontSize:12,color:"var(--grd)"}},"Łącznie okno"),
        ce("span",{style:{fontSize:16,fontWeight:700,color:"var(--grd)"}},Math.round(wtv)+" z\u0142")
      ):null,
      ce("div",{style:{display:"flex",gap:8}},Btn("Zapisz okno",saveWin,true),Btn("Anuluj",function(){setScreen("windows");},false))
    );
  }

  // ── SUMMARY ──
  else if(screen==="sum"&&curClient){
    var sRooms=(curClient.rooms||[]).filter(function(r){return(r.windows||[]).length>0;});
    content=ce(Fragment,null,
      sRooms.map(function(r){
        return ce("div",{key:r.id,style:{marginBottom:12}},
          ce("div",{style:{fontSize:11,fontWeight:600,color:"var(--t2)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:6}},r.icon+" "+r.name+" \u2014 "+Math.round(rt(r))+" z\u0142"),
          (r.windows||[]).map(function(w){
            var t=wt(w);
            var desc=(w.products||[]).map(function(p){var l=(PROD_TYPES.find(function(pt){return pt.id===p.type;})||{label:p.type}).label;return p.fabName?l+" ("+p.fabName+")":l;}).join(", ");
            return ce("div",{key:w.id,style:{padding:"8px 10px",background:"var(--bg2)",borderRadius:8,marginBottom:4,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}},
              ce("div",null,
                ce("div",{style:{fontSize:12,fontWeight:500,color:"var(--t1)"}},"🪟 "+w.name),
                ce("div",{style:{fontSize:11,color:"var(--t3)",marginTop:2}},desc||"\u2014")
              ),
              ce("div",{style:{fontSize:13,fontWeight:600,color:"var(--gr)",whiteSpace:"nowrap"}},Math.round(t)+" z\u0142")
            );
          })
        );
      }),
      sRooms.length===0?ce("div",{style:{color:"var(--t3)",fontSize:12,padding:"12px 0"}},"Brak okien do podsumowania."):null,
      ce("div",{style:{background:"var(--t1)",borderRadius:10,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,marginTop:8}},
        ce("span",{style:{fontSize:13,color:"rgba(255,255,255,0.7)",letterSpacing:"0.04em"}},"Łącznie cała wizyta"),
        ce("span",{style:{fontSize:20,fontWeight:700,color:"#fff"}},Math.round(clientTotal(curClient))+" z\u0142")
      ),
      ce("div",{style:{display:"flex",gap:8}},Btn("\u2190 Edytuj",function(){setScreen("rooms");},false))
    );
  }

  return ce("div",{style:{padding:"1.1rem"}},
    // Topbar
    screen!=="home"?ce("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:"1rem"}},
      ce("button",{onClick:function(){setScreen("home");},style:{border:"none",background:"none",cursor:"pointer",padding:"2px 0",color:"var(--t3)",fontSize:11,letterSpacing:"0.08em"}},"\u2190"),
      ce("img",{src:LOGO_SRC,alt:"PD",style:{height:18,opacity:0.7}})
    ):null,
    screen!=="home"?ce(BC,{}):null,
    content,
    showClientModal?ce(ModalClient,{onOk:addClient,onClose:function(){setShowClientModal(false);}}):null,
    showRoomModal?ce(ModalSimple,{title:"Nowe pomieszczenie",placeholder:"np. Kuchnia, Pok\xf3j Kasi...",onOk:addRoom,onClose:function(){setShowRoomModal(false);}}):null,
    showWinModal?ce(ModalSimple,{title:"Nowe okno",placeholder:"np. Okno lewe, Taras...",onOk:newWin,onClose:function(){setShowWinModal(false);}}):null
  );
}

ReactDOM.createRoot(document.getElementById("app-mount")).render(ce(App,{}));
})();
</script>
</body>
</html>
