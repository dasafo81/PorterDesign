<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Porter Design - System Wycen</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#ffffff;--bg2:#f7f7f5;
      --bd1:#d0d0cc;--bd2:#e0e0dc;--bd3:#ececea;
      --t1:#1a1a18;--t2:#6b6b66;--t3:#a0a09c;
      --gr:#3B6D11;--grl:#EAF3DE;--grd:#27500A;--grm:#97C459;
      --err:#cc3300;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--t1);min-height:100vh;}
    #root{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;padding:1rem;box-shadow: 0 0 20px rgba(0,0,0,0.05);}
    
    .card{border:1px solid var(--bd3);border-radius:12px;padding:12px;margin-bottom:12px;background:#fff;}
    .flex-sep{display:flex;justify-content:space-between;align-items:center;}
    .btn{
      padding:10px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;
      transition: opacity 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .btn-main{background:var(--gr);color:#fff;}
    .btn-sec{background:var(--grl);color:var(--grd);}
    .btn-ghost{background:transparent;border:1px solid var(--bd2);color:var(--t2);}
    .btn-danger{background:#fff;color:var(--err);border:1px solid var(--err);font-size:12px;padding:4px 8px;}
    
    input, select{
      width:100%;padding:12px;border:1px solid var(--bd2);border-radius:8px;margin-top:4px;font-size:15px;
    }
    label{font-size:12px;color:var(--t2);font-weight:600;text-transform:uppercase;}
    .badge{font-size:11px;padding:2px 6px;background:var(--bg2);border-radius:4px;color:var(--t2);}
    .total-bar{background:var(--grd);color:#fff;padding:16px;border-radius:12px;margin-top:20px;}
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const { useState, useEffect, createElement: ce } = React;

function App() {
  // --- STAN APLIKACJI ---
  const [customers, setCustomers] = useState(() => {
    const saved = localStorage.getItem('pd_data_v2');
    return saved ? JSON.parse(saved) : [];
  });
  
  const [screen, setScreen] = useState('customer_list'); 
  const [activeCustId, setActiveCustId] = useState(null);
  const [activeRoomIdx, setActiveRoomIdx] = useState(null);
  const [calcData, setCalcData] = useState({ cat: 'wood', w: 100, h: 100, type: '50mm' });

  useEffect(() => {
    localStorage.setItem('pd_data_v2', JSON.stringify(customers));
  }, [customers]);

  // --- FUNKCJE ---
  const addCustomer = () => {
    const name = prompt("Imię i nazwisko klienta:");
    if(!name) return;
    const newCust = { id: Date.now(), name, date: new Date().toLocaleDateString(), rooms: [] };
    setCustomers([...customers, newCust]);
  };

  const deleteCustomer = (id) => {
    if(confirm("Usunąć klienta i wszystkie jego wyceny?")) {
      setCustomers(customers.filter(c => c.id !== id));
    }
  };

  const addRoom = (custId) => {
    const name = prompt("Nazwa pomieszczenia (np. Salon, Kuchnia):");
    if(!name) return;
    setCustomers(customers.map(c => {
      if(c.id === custId) return { ...c, rooms: [...c.rooms, { name, items: [] }] };
      return c;
    }));
  };

  const addItemToRoom = (price, description) => {
    setCustomers(customers.map(c => {
      if(c.id === activeCustId) {
        const newRooms = [...c.rooms];
        newRooms[activeRoomIdx].items.push({ description, price, id: Date.now() });
        return { ...c, rooms: newRooms };
      }
      return c;
    }));
    setScreen('visit_details');
  };

  const removeItem = (roomIdx, itemIdx) => {
    setCustomers(customers.map(c => {
      if(c.id === activeCustId) {
        const newRooms = [...c.rooms];
        newRooms[roomIdx].items.splice(itemIdx, 1);
        return { ...c, rooms: newRooms };
      }
      return c;
    }));
  };

  const activeCustomer = customers.find(c => c.id === activeCustId);

  // --- WIDOK 1: LISTA KLIENTÓW ---
  if (screen === 'customer_list') {
    return ce('div', null,
      ce('h2', {style:{marginBottom:'20px'}}, "Moje Wizyty"),
      customers.length === 0 && ce('p', {style:{color:'#999', fontSize:'14px', textAlign:'center', marginTop:'40px'}}, "Brak zapisanych wizyt. Dodaj pierwszą poniżej."),
      customers.map(c => ce('div', {key: c.id, className: 'card flex-sep'},
        ce('div', {onClick: () => { setActiveCustId(c.id); setScreen('visit_details'); }, style:{cursor:'pointer', flex:1}},
          ce('div', {style:{fontWeight:600}}, c.name),
          ce('div', {className:'badge'}, c.date + " • " + c.rooms.length + " pokoi")
        ),
        ce('button', {className:'btn-danger', onClick: () => deleteCustomer(c.id)}, "Usuń")
      )),
      ce('button', {className:'btn btn-main', style:{width:'100%', marginTop:'20px'}, onClick: addCustomer}, "+ Nowy Klient")
    );
  }

  // --- WIDOK 2: POKOJE I ELEMENTY ---
  if (screen === 'visit_details' && activeCustomer) {
    let grandTotal = 0;
    activeCustomer.rooms.forEach(r => r.items.forEach(i => grandTotal += i.price));

    return ce('div', null,
      ce('div', {className:'flex-sep', style:{marginBottom:'20px'}},
        ce('button', {className:'btn-ghost', onClick: () => setScreen('customer_list')}, "← Powrót"),
        ce('div', {style:{textAlign:'right'}},
          ce('div', {style:{fontWeight:700}}, activeCustomer.name),
          ce('div', {className:'badge'}, "Podsumowanie")
        )
      ),

      activeCustomer.rooms.map((room, rIdx) => ce('div', {key: rIdx, className:'card', style:{background:'#f9f9f9'}},
        ce('div', {className:'flex-sep', style:{marginBottom:'10px'}},
          ce('strong', null, "📍 " + room.name),
          ce('span', {style:{color:'var(--grd)', fontWeight:700}}, 
            Math.round(room.items.reduce((a,b)=>a+b.price, 0)) + " zł")
        ),
        room.items.map((item, iIdx) => ce('div', {key: iIdx, className:'flex-sep', style:{fontSize:'13px', padding:'6px 0', borderBottom:'1px solid #eee'}},
          ce('span', null, item.description),
          ce('div', {style:{display:'flex', gap:'8px', alignItems:'center'}},
            ce('span', null, Math.round(item.price) + " zł"),
            ce('span', {style:{color:'red', cursor:'pointer', padding:'4px'}, onClick: () => removeItem(rIdx, iIdx)}, "✕")
          )
        )),
        ce('button', {
          className:'btn btn-sec', 
          style:{width:'100%', marginTop:'10px', fontSize:'12px'},
          onClick: () => { setActiveRoomIdx(rIdx); setScreen('calc'); }
        }, "+ Dodaj okno")
      )),

      ce('button', {className:'btn btn-ghost', style:{width:'100%', marginBottom:'10px'}, onClick: () => addRoom(activeCustomer.id)}, "+ Dodaj Pomieszczenie"),
      
      ce('div', {className:'total-bar flex-sep'},
        ce('span', null, "ŁĄCZNIE WIZYTA"),
        ce('span', {style:{fontSize:'20px', fontWeight:800}}, Math.round(grandTotal) + " zł")
      )
    );
  }

  // --- WIDOK 3: KALKULATOR ELEMENTU ---
  if (screen === 'calc') {
    const mockPrice = (calcData.w * calcData.h * 0.02); 

    return ce('div', null,
      ce('button', {className:'btn-ghost', onClick: () => setScreen('visit_details'), style:{marginBottom:'20px'}}, "← Anuluj"),
      ce('h3', null, "Wycena elementu"),
      ce('p', {style:{fontSize:'12px', color:'var(--t2)', marginBottom:'15px'}}, "Pokój: " + activeCustomer.rooms[activeRoomIdx].name),
      
      ce('label', null, "Kategoria"),
      ce('select', {value: calcData.cat, onChange: (e) => setCalcData({...calcData, cat: e.target.value})},
        ce('option', {value:'wood'}, "Żaluzje Drewniane"),
        ce('option', {value:'alu'}, "Żaluzje Aluminiowe"),
        ce('option', {value:'curtain'}, "Zasłony / Firany")
      ),

      ce('div', {style:{display:'flex', gap:'10px', marginTop:'15px'}},
        ce('div', {style:{flex:1}},
          ce('label', null, "Szerokość (cm)"),
          ce('input', {type:'number', value: calcData.w, onChange: (e) => setCalcData({...calcData, w: e.target.value})})
        ),
        ce('div', {style:{flex:1}},
          ce('label', null, "Wysokość (cm)"),
          ce('input', {type:'number', value: calcData.h, onChange: (e) => setCalcData({...calcData, h: e.target.value})})
        )
      ),

      ce('div', {className:'card', style:{marginTop:'20px', textAlign:'center', border:'2px solid var(--gr)'}},
        ce('div', {style:{fontSize:'12px', color:'var(--t2)'}}, "Wstępna cena"),
        ce('div', {style:{fontSize:'32px', fontWeight:800, color:'var(--grd)'}}, Math.round(mockPrice) + " zł")
      ),

      ce('button', {
        className:'btn btn-main', 
        style:{width:'100%', marginTop:'10px'},
        onClick: () => addItemToRoom(mockPrice, `${calcData.cat} ${calcData.w}x${calcData.h}`)
      }, "Zapisz do pokoju")
    );
  }
}

// Inicjalizacja
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(ce(App));
</script>
</body>
</html>
