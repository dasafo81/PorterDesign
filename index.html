<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Porter Design - Asystent Handlowca</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#ffffff;--bg2:#f7f7f5;
      --bd1:#d0d0cc;--bd2:#e0e0dc;--bd3:#ececea;
      --t1:#1a1a18;--t2:#6b6b66;--t3:#a0a09c;
      --gr:#3B6D11;--grl:#EAF3DE;--grd:#27500A;--grm:#97C459;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--t1);min-height:100vh;}
    #root{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;padding:1rem;}
    input,select,button{font-family:inherit;}
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
(function(){
"use strict";
var ce=React.createElement,useState=React.useState,Fragment=React.Fragment;

// --- DANE I CENNIKI ---
var FABRICS=[
  {name:"Alise",brutto:230,prod:"FIBERO",width:300},
  {name:"Alma",brutto:165,prod:"Ridex",width:315},
  {name:"Alto",brutto:120,prod:"VV design",width:370},
  {name:"Amber",brutto:110,prod:"SAMA",width:300},
  {name:"Antonio",brutto:220,prod:"MARGO",width:300}
];

var PROD_TYPES=[
  {id:"zaslona",label:"Zasłona"},{id:"firana",label:"Firana"},
  {id:"zaluzja",label:"Żaluzja"},{id:"roleta",label:"Roleta"},
  {id:"szyna",label:"Szyna KAES"},{id:"karnisz",label:"Karnisz el."}
];

// Pomocnicze tabele cennikowe
var RCITY={80:83.8,100:90.78,120:107.57,140:114.57,160:121.55,180:135.87,200:149.79,300:216.67};
var KW={biala:{100:124,200:221,300:336,400:443,500:561,600:661},czarna:{100:143,200:221,300:380,400:501,500:636,600:748}};

// --- LOGIKA OBLICZEŃ ---
function lookup(val,obj){
  var keys=Object.keys(obj).map(Number).sort((a,b)=>a-b);
  var k=keys.find(k=>k>=val)||keys[keys.length-1];
  return {p:obj[k],k:k};
}

function calc(p){
  var c=p.c||{},par=p.par||{};
  var fabP=p.fabMan!=null?p.fabMan:(p.fabP!=null?p.fabP:null);
  var total=0,lines=[];

  if(p.type==="zaslona"||p.type==="firana"){
    var wCm=par.wCm||0,hCm=par.hCm||0;
    if(!wCm||fabP==null)return{total:0,lines:[]};
    var mars=parseFloat(c.mars||"1.5");
    (p.panels||[]).forEach(pn=>{
      var pw=pn.w||wCm,z=parseFloat((pw/100*mars+0.2).toFixed(2));
      var koszt=z*fabP + (z*100); // 100zl robocizna
      total+=koszt;
      lines.push(pn.side+": "+z+"mb -> "+koszt.toFixed(2)+"zł");
    });
  }else if(p.type==="szyna"){
    var lenCm=par.len||0;
    if(!lenCm)return{total:0,lines:[]};
    if(c.ks==="wave"){total=lookup(lenCm,KW[c.kk||"biala"]).p;}
    else{total=(lenCm/100)*80;}
    lines.push("KAES "+lenCm+"cm");
  }else if(p.type==="zaluzja"){
    var w=par.wCm||0,h=par.hCm||0;
    var m2=Math.max(0.5, (w/100)*(h/100));
    total=m2*450;
    lines.push("Żaluzja "+m2.toFixed(2)+"m2");
  }else if(p.type==="roleta"){
    var w=par.wCm||0;
    total=lookup(w,RCITY).p + (fabP||0);
    lines.push("Roleta City");
  }
  return{total:total,lines:lines};
}

// --- KOMPONENTY UI ---
var IST={padding:"8px",fontSize:"14px",border:"1px solid var(--bd2)",borderRadius:"6px",background:"var(--bg)",width:"100%"};

function Btn(label,onClick,primary){
  return ce("button",{onClick:onClick,style:{padding:"8px 16px",borderRadius:"8px",border:"none",background:primary?"var(--gr)":"var(--bd3)",color:primary?"#fff":"var(--t1)",fontWeight:"600",cursor:"pointer"}},label);
}

function FabPicker(p){
  var [q,setQ]=useState("");
  var list=FABRICS.filter(f=>f.name.toLowerCase().includes(q.toLowerCase()));
  return ce("div",{style:{border:"1px solid var(--bd3)",borderRadius:"8px",marginTop:"8px"}},
    ce("input",{value:q,onChange:e=>setQ(e.target.value),placeholder:"Szukaj tkaniny...",style:{width:"100%",padding:"8px",border:"none",borderBottom:"1px solid var(--bd3)"}}),
    ce("div",{style:{maxHeight:"120px",overflowY:"auto"}},
      list.map(f=>ce("div",{key:f.name,onClick:()=>p.onSelect(f),style:{padding:"8px",fontSize:"12px",cursor:"pointer",background:p.fabName===f.name?"var(--grl)":"#fff"}},f.name+" - "+f.brutto+"zł"))
    )
  );
}

function ProdCard(p){
  var prod=p.prod,c=prod.c||{},par=prod.par||{};
  var res=calc(prod);
  var finalPrice=prod.mp!=null?prod.mp:res.total;

  return ce("div",{style:{background:"#fff",border:"1px solid var(--bd3)",borderRadius:"12px",padding:"12px",marginBottom:"10px"}},
    ce("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"10px"}},
      ce("b",{},(PROD_TYPES.find(t=>t.id===prod.type)||{}).label),
      ce("button",{onClick:p.onRemove,style:{border:"none",background:"none",color:"red"}},"usuń")
    ),
    ce("div",{style:{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"10px"}},
      PROD_TYPES.map(t=>ce("button",{onClick:()=>p.onChange({...prod,type:t.id,fabName:null,fabP:null,panels:[]}),style:{fontSize:"10px",padding:"4px 8px",borderRadius:"10px",border:"1px solid var(--bd2)",background:prod.type===t.id?"var(--grl)":"#fff"}},t.label))
    ),
    prod.type==="szyna"?ce("input",{type:"number",placeholder:"Długość szyny (cm)",value:par.len||"",onChange:e=>p.onChange({...prod,par:{...par,len:e.target.value}}),style:IST}):
    ce(Fragment,null,
      ce("div",{style:{display:"flex",gap:"5px"}},
        ce("input",{type:"number",placeholder:"Szer (cm)",value:par.wCm||"",onChange:e=>p.onChange({...prod,par:{...par,wCm:e.target.value}}),style:IST}),
        ce("input",{type:"number",placeholder:"Wys (cm)",value:par.hCm||"",onChange:e=>p.onChange({...prod,par:{...par,hCm:e.target.value}}),style:IST})
      ),
      (prod.type==="zaslona"||prod.type==="firana")&&ce(Fragment,null,
        ce(FabPicker,{fabName:prod.fabName,onSelect:f=>p.onChange({...prod,fabName:f.name,fabP:f.brutto,panels:[{side:"Całość",w:par.wCm}]})}),
        ce("div",{style:{marginTop:"5px",fontSize:"11px"}},"Marszczenie: ",
          ce("select",{value:c.mars||"1.5",onChange:e=>p.onChange({...prod,c:{...c,mars:e.target.value}})},ce("option",{value:"1.5"},"150%"),ce("option",{value:"2.0"},"200%")))
      )
    ),
    ce("div",{style:{marginTop:"10px",padding:"8px",background:"var(--bg2)",borderRadius:"6px",fontSize:"13px",fontWeight:"600",textAlign:"right"}},
      "Cena: "+Math.round(finalPrice)+" zł"
    )
  );
}

// --- GŁÓWNA APLIKACJA ---
function App(){
  var [screen,setScreen]=useState("home");
  var [clients,setClients]=useState([{id:1,name:"Jan Kowalski",addr:"Warszawa",rooms:[]}]);
  var [curCId,setCurCId]=useState(null);
  var [curRId,setCurRId]=useState(null);
  var [curWin,setCurWin]=useState(null);
  var [modal,setModal]=useState(null);

  var client=clients.find(c=>c.id===curCId);
  var room=client?client.rooms.find(r=>r.id===curRId):null;

  function addClient(n,a){
    var nc={id:Date.now(),name:n||"Nowy",addr:a||"",rooms:[]};
    setClients(p=>[...p,nc]); setCurCId(nc.id); setScreen("rooms");
  }

  function saveWin(){
    setClients(prev=>prev.map(c=>c.id===curCId?{...c,rooms:c.rooms.map(r=>r.id===curRId?{...r,windows:r.windows.find(w=>w.id===curWin.id)?r.windows.map(w=>w.id===curWin.id?curWin:w):[...r.windows,curWin]}:r)}:c));
    setScreen("windows");
  }

  function getGrandTotal(){
    if(!client)return 0;
    return client.rooms.reduce((s,r)=>s+r.windows.reduce((sw,w)=>sw+w.products.reduce((sp,p)=>sp+(p.mp||calc(p).total),0),0),0);
  }

  function generatePDF(){
    var {jsPDF}=window.jspdf; var doc=new jsPDF();
    doc.setFontSize(18); doc.text("OFERTA - PORTER DESIGN", 10, 20);
    doc.setFontSize(12); doc.text("Klient: "+client.name, 10, 30);
    doc.text("Adres: "+client.addr, 10, 37);
    doc.line(10, 42, 200, 42);
    var y=50;
    client.rooms.forEach(r=>{
      doc.setFontSize(14); doc.text(r.name, 10, y); y+=8;
      r.windows.forEach(w=>{
        doc.setFontSize(10); doc.text("- "+w.name, 15, y); y+=6;
      });
      y+=4;
    });
    doc.setFontSize(16); doc.text("SUMA DO ZAPLATY: "+Math.round(getGrandTotal())+" zl", 10, y+10);
    doc.save("Wycena_"+client.name+".pdf");
  }

  // --- MODAL Z WŁASNYM STANEM (NAPRAWIA FOCUS) ---
  function Modal(){
    var [n,setN]=useState(""); var [a,setA]=useState("");
    if(!modal)return null;
    return ce("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}},
      ce("div",{style:{background:"#fff",padding:"20px",borderRadius:"15px",width:"300px"}},
        ce("h3",{style:{marginBottom:"15px"}},"Dodaj"),
        ce("input",{autoFocus:true,value:n,onChange:e=>setN(e.target.value),placeholder:"Nazwa",style:{...IST,marginBottom:"10px"}}),
        modal==="client"&&ce("input",{value:a,onChange:e=>setA(e.target.value),placeholder:"Adres",style:{...IST,marginBottom:"10px"}}),
        ce("div",{style:{display:"flex",gap:"10px"}},
          Btn("Dodaj",()=>{
            if(modal==="client") addClient(n,a);
            if(modal==="room") setClients(p=>p.map(c=>c.id===curCId?{...c,rooms:[...c.rooms,{id:Date.now(),name:n,windows:[]}]}:c));
            if(modal==="win"){ setCurWin({id:Date.now(),name:n,products:[]}); setScreen("detail"); }
            setModal(null);
          },true),
          Btn("Anuluj",()=>setModal(null))
        )
      )
    );
  }

  var content=null;
  if(screen==="home") content=ce("div",null,
    ce("h2",{style:{marginBottom:"15px"}},"Klienci"),
    clients.map(c=>ce("div",{key:c.id,onClick:()=>{setCurCId(c.id);setScreen("rooms")},style:{padding:"15px",background:"#fff",borderRadius:"12px",marginBottom:"10px",border:"1px solid var(--bd3)",cursor:"pointer"}},ce("b",null,c.name),ce("div",{style:{fontSize:"12px",color:"var(--t2)"}},c.addr))),
    Btn("+ Nowy Klient",()=>setModal("client"))
  );
  else if(screen==="rooms") content=ce("div",null,
    ce("h2",null,client.name),
    ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",margin:"15px 0"}},
      client.rooms.map(r=>ce("div",{key:r.id,onClick:()=>{setCurRId(r.id);setScreen("windows")},style:{padding:"20px",background:"var(--grl)",borderRadius:"12px",textAlign:"center",cursor:"pointer"}},r.name)),
      ce("div",{onClick:()=>setModal("room"),style:{padding:"20px",border:"2px dashed var(--bd2)",borderRadius:"12px",textAlign:"center",cursor:"pointer"}},"+ Pokój")
    ),
    ce("div",{style:{display:"flex",gap:"10px"}},Btn("PDF",generatePDF,true),Btn("Wstecz",()=>setScreen("home")))
  );
  else if(screen==="windows") content=ce("div",null,
    ce("h2",null,room.name),
    room.windows.map(w=>ce("div",{key:w.id,onClick:()=>{setCurWin(w);setScreen("detail")},style:{padding:"12px",background:"#fff",border:"1px solid var(--bd3)",borderRadius:"10px",marginBottom:"10px",cursor:"pointer"}},w.name)),
    ce("div",{style:{display:"flex",gap:"10px"}},Btn("+ Okno",()=>setModal("win"),true),Btn("Wstecz",()=>setScreen("rooms")))
  );
  else if(screen==="detail") content=ce("div",null,
    ce("h2",null,"Okno: "+curWin.name),
    curWin.products.map((p,i)=>ce(ProdCard,{key:p.id,prod:p,onRemove:()=>setCurWin({...curWin,products:curWin.products.filter((_,j)=>j!==i)}),onChange:np=>setCurWin({...curWin,products:curWin.products.map((x,j)=>j===i?np:x)})})),
    ce("div",{style:{display:"flex",gap:"10px",marginTop:"15px"}},
      Btn("+ Produkt",()=>setCurWin({...curWin,products:[...curWin.products,{id:Date.now(),type:"zaslona",par:{},c:{},panels:[]}]})),
      Btn("Zapisz",saveWin,true)
    )
  );

  return ce("div",null,content,ce(Modal,null));
}

ReactDOM.createRoot(document.getElementById("root")).render(ce(App));
})();
</script>
</body>
</html>
