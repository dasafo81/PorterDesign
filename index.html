<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Ofertowy - Porter Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen pb-20">

    <header class="bg-green-700 text-white p-4 shadow-md mb-6">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">PD Porter Design</h1>
            <span class="text-xs bg-green-800 px-2 py-1 rounded">v2.0 Beta</span>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4">
        
        <section id="client-section" class="bg-white rounded-2xl shadow-sm p-6 mb-4 border-l-4 border-green-500">
            <h2 class="font-bold text-gray-700 mb-4 uppercase text-sm tracking-widest"><i class="fas fa-user-edit mr-2"></i>Dane Klienta</h2>
            <input type="text" id="clientName" placeholder="Imię i Nazwisko" class="w-full mb-3 p-3 border rounded-xl outline-none focus:ring-2 ring-green-500">
            <input type="text" id="clientAddress" placeholder="Adres (ulica, miasto)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 ring-green-500">
        </section>

        <div id="rooms-container">
            </div>

        <button onclick="addRoom()" class="w-full py-4 bg-white border-2 border-dashed border-green-300 rounded-2xl text-green-600 font-bold hover:bg-green-50 transition-all">
            <i class="fas fa-plus-circle mr-2"></i>DODAJ NOWE POMIESZCZENIE
        </button>

    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-gray-400 uppercase">Łączna kwota:</p>
                <p id="grand-total" class="text-2xl font-black text-green-700">0,00 zł</p>
            </div>
            <button onclick="window.print()" class="bg-gray-800 text-white px-6 py-2 rounded-xl font-bold">
                <i class="fas fa-file-pdf mr-2"></i>PDF
            </button>
        </div>
    </footer>

    <script>
        let roomCount = 0;

        function addRoom() {
            roomCount++;
            const roomDiv = document.createElement('div');
            roomDiv.className = "bg-white rounded-2xl shadow-sm p-6 mb-4 animate-slide-up relative";
            roomDiv.id = `room-${roomCount}`;
            roomDiv.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <input type="text" placeholder="Nazwa pokoju (np. Salon)" class="font-bold text-lg text-gray-800 border-b border-transparent focus:border-green-200 outline-none w-2/3">
                    <button onclick="removeRoom(${roomCount})" class="text-red-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                </div>
                <div id="products-room-${roomCount}" class="space-y-3 mb-4"></div>
                <button onclick="addProduct(${roomCount})" class="text-sm text-green-600 font-bold bg-green-50 px-3 py-2 rounded-lg hover:bg-green-100">
                    + Dodaj produkt
                </button>
            `;
            document.getElementById('rooms-container').appendChild(roomDiv);
        }

        function addProduct(roomId) {
            const container = document.getElementById(`products-room-${roomId}`);
            const prodDiv = document.createElement('div');
            prodDiv.className = "p-3 bg-slate-50 rounded-xl border border-slate-100 flex gap-2 items-center";
            prodDiv.innerHTML = `
                <select onchange="updateTotal()" class="bg-transparent font-medium flex-1 outline-none text-sm prod-price">
                    <option value="0">Wybierz produkt...</option>
                    <option value="160">Tkanina 1310 (160zł)</option>
                    <option value="230">Tkanina Alise (230zł)</option>
                    <option value="195">Billy Dim-Out (195zł)</option>
                    <option value="100">Roleta Standard (100zł)</option>
                </select>
                <input type="number" placeholder="Szer." oninput="updateTotal()" class="w-16 p-1 rounded border text-center text-sm prod-width">
                <span class="text-gray-400 text-xs">x</span>
                <input type="number" placeholder="Wys." oninput="updateTotal()" class="w-16 p-1 rounded border text-center text-sm prod-height">
            `;
            container.appendChild(prodDiv);
        }

        function removeRoom(id) {
            document.getElementById(`room-${id}`).remove();
            updateTotal();
        }

        function updateTotal() {
            let grandTotal = 0;
            const prices = document.querySelectorAll('.prod-price');
            const widths = document.querySelectorAll('.prod-width');
            const heights = document.querySelectorAll('.prod-height');

            prices.forEach((p, i) => {
                const price = parseFloat(p.value) || 0;
                const w = parseFloat(widths[i].value) || 0;
                const h = parseFloat(heights[i].value) || 0;
                
                // Przykładowa logika: m2 * cena (jeśli h > 0) lub mb * cena
                if(w > 0) {
                    const area = (w/100) * (h > 0 ? h/100 : 1);
                    grandTotal += area * price;
                }
            });

            document.getElementById('grand-total').innerText = grandTotal.toLocaleString('pl-PL', {style: 'currency', currency: 'PLN'});
        }

        // Dodaj pierwszy pokój na start
        addRoom();
    </script>

    <style>
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
</body>
</html>
