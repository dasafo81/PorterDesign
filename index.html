<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Porter Design"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <title>Porter Design Assistant</title>
</head>
<body>
  <div id="root">
    <div class="app-inner">
      <div id="app-mount"></div>
    </div>
    <div style="text-align:center;padding:0.8rem 1rem 1.4rem;font-size:8px;color:var(--t3);letter-spacing:0.18em;text-transform:uppercase;border-top:0.5px solid var(--bd3);opacity:0.6;margin-top:auto;">
      Created by Porter Design &nbsp;·&nbsp;
      <span id="app-version" style="cursor:pointer;text-decoration:underline;text-underline-offset:2px;" title="Historia zmian">v1.3.0</span>
    </div>
  </div>

  <!-- CHANGELOG MODAL -->
  <div id="changelog-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:var(--bg2,#1e1e2e);border:1px solid var(--bd2,#333);border-radius:16px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;padding:2rem;position:relative;box-shadow:0 8px 40px rgba(0,0,0,0.5);">
      <button id="changelog-close" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--t2,#aaa);font-size:1.4rem;cursor:pointer;line-height:1;">×</button>
      <h2 style="margin:0 0 1.5rem;font-size:1rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--t1,#eee);">Historia zmian</h2>
      <div id="changelog-body" style="font-size:0.82rem;line-height:1.7;color:var(--t2,#ccc);"></div>
    </div>
  </div>

  <script>
    var CHANGELOG = [
      {
        version: "v1.3.0",
        date: "2026-04-30",
        items: [
          "Nowy moduł CRM — tablica Kanban z etapami sprzedaży i zarządzaniem szansami",
          "Nowy moduł Mail — szablony wiadomości e-mail z podglądem i autouzupełnianiem danych klienta",
          "Poprawka: crash modułu Mail (brak importu roundTo10)",
          "Usunięto logi diagnostyczne z modułu CRM"
        ]
      },
      {
        version: "v1.2.0",
        date: "2026-04-01",
        items: [
          "System wariantów A/B/C — alternatywne opcje w oknie, nie sumowane",
          "Duplikowanie produktów jednym kliknięciem",
          "Modalne potwierdzenia destruktywnych akcji (usuwanie, zmiana typu)",
          "Prowizja polecenia (%) stosowana per produkt z zaokrągleniem do 10 zł"
        ]
      },
      {
        version: "v1.1.0",
        date: "2026-03-01",
        items: [
          "Generowanie PDF: pełna wycena, uproszczona wycena, zamówienie tkanin, zamówienie szycia",
          "Produkt 'Inny' — pozycja niestandardowa z ręczną ceną",
          "Szyny elektryczne i standardowe jako oddzielny typ produktu",
          "Zaokrąglanie cen do najbliższych 10 zł"
        ]
      },
      {
        version: "v1.0.0",
        date: "2026-02-01",
        items: [
          "Pierwsze wydanie aplikacji Porter Design Assistant",
          "Zarządzanie klientami: dane, pokoje, okna, produkty",
          "Typy produktów: zasłony, rolety, żaluzje",
          "Integracja z Supabase i wdrożenie na Vercel"
        ]
      }
    ];

    function renderChangelog() {
      var html = "";
      CHANGELOG.forEach(function(entry) {
        html += "<div style=\"margin-bottom:1.4rem;\">";
        html += "<div style=\"display:flex;align-items:baseline;gap:0.6rem;margin-bottom:0.5rem;\">";
        html += "<span style=\"font-weight:700;color:var(--accent,#a78bfa);font-size:0.9rem;\">" + entry.version + "</span>";
        html += "<span style=\"font-size:0.72rem;color:var(--t3,#888);\">" + entry.date + "</span>";
        html += "</div>";
        html += "<ul style=\"margin:0;padding-left:1.2rem;\">";
        entry.items.forEach(function(item) {
          html += "<li style=\"margin-bottom:0.25rem;\">" + item + "</li>";
        });
        html += "</ul></div>";
      });
      document.getElementById("changelog-body").innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", function() {
      var overlay = document.getElementById("changelog-overlay");
      var closeBtn = document.getElementById("changelog-close");
      var versionSpan = document.getElementById("app-version");

      renderChangelog();

      versionSpan.addEventListener("click", function() {
        overlay.style.display = "flex";
      });
      closeBtn.addEventListener("click", function() {
        overlay.style.display = "none";
      });
      overlay.addEventListener("click", function(e) {
        if (e.target === overlay) overlay.style.display = "none";
      });
    });
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
