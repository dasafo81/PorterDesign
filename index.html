<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Porter Design - Ekspercki System Wycen</title>
  <style>
    :root {
      --primary: #2d4a22; /* Głęboka zieleń Porter Design */
      --accent: #8ba870;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #333333;
      --text-light: #777777;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: var(--bg); 
      color: var(--text);
      line-height: 1.5;
    }

    #root { max-width: 500px; margin: 0 auto; min-height: 100vh; padding: 20px; }

    /* Nagłówki */
    h2 { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: var(--primary); }
    h3 { font-size: 18px; margin-bottom: 15px; }

    /* Karty */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.03);
      transition: transform 0.2s;
    }

    /* Przyciski */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: var(--radius);
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      font-size: 15px;
    }
    .btn-main { background: var(--primary); color: white; }
    .btn-main:active { transform: scale(0.98); opacity: 0.9; }
    
    .btn-secondary { background: #f0f2f0; color: var(--primary); margin-top: 10px; }
    
    .btn-outline { 
      background: transparent; 
      border: 1.5px solid #eee; 
      color: var(--text-light); 
      padding: 8px 15px;
      font-size: 13px;
      width: auto;
    }

    /* Formularz w Kalkulatorze */
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 6px; margin-left: 4px; }
    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1.5px solid #eee;
      font-size: 16px;
      background: #fdfdfd;
    }
    input:focus { outline: none; border-color: var(--accent); }

    /* Elementy listy */
    .flex-row { display: flex; justify-content: space-between; align-items: center; }
    .customer-item { border-left: 4px solid var(--accent); }
    .badge { font-size: 11px; background: #f0f4ee; color: var(--primary); padding: 4px 10px; border-radius: 20px; font-weight: 700; }
    
    .price-tag { font-size: 28px; font-weight: 800; color: var(--primary); text-align: center; margin: 10px 0; }
    
    .room-header { background: #f9fbf8; padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; border: 1px dashed #ccd5c6; }
    
    .item-row { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #555; }
    .item-row:last-child { border: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const { useState, useEffect, createElement: ce } = React;

function App() {
  const [customers, setCustomers] = useState(() => {
    const saved = localStorage.getItem('pd_pro_data');
    return saved ? JSON.parse(saved) : [];
  });
  
  const [screen, setScreen] = useState('list'); 
  const [activeCustId, setActiveCustId] = useState(null);
  const [activeRoomIdx, setActiveRoomIdx] = useState(null);
  const [calc, setCalc] = useState({ cat: 'Drewno 50mm', w: 100, h: 150 });

  useEffect(() => {
    localStorage.setItem('pd_pro_data', JSON.stringify(customers));
  }, [customers]);

  const addCustomer = () => {
    const name = prompt("Imię i nazwisko klienta:");
    if(!name) return;
    setCustomers([...customers, { id: Date.now(), name, date: new Date().toLocaleDateString(), rooms: [] }]);
  };

  const addRoom = () => {
    const room = prompt("Nazwa pomieszczenia (np. Salon):");
    if(!room) return;
    setCustomers(customers.map(c => c.id === activeCustId ? { ...c, rooms: [...c.rooms, { name: room, items: [] }] } : c));
  };

  const activeCustomer = customers.find(c => c.id === activeCustId);

  // WIDOK 1: LISTA KLIENTÓW
  if (screen === 'list') {
    return ce('div', null,
      ce('h2', null, "Twoje Wizyty"),
      customers.map(c => ce('div', { key: c.id, className: 'card flex-row customer-item', onClick: () => { setActiveCustId(c.id); setScreen('details'); } },
        ce('div', null, 
          ce('div', { style: { fontWeight: 700 } }, "👤 " + c.name),
          ce('div', { className: 'badge', style: { marginTop: '5px' } }, c.date)
        ),
        ce('div', { style: { color: '#ccc' } }, "❯")
      )),
      ce('button', { className: 'btn btn-main', onClick: addCustomer }, "＋ Nowy klient")
    );
  }

  // WIDOK 2: SZCZEGÓŁY WIZYTY
  if (screen === 'details' && activeCustomer) {
    const total = activeCustomer.rooms.reduce((acc, r) => acc + r.items.reduce((sum, i) => sum + i.price, 0), 0);

    return ce('div', null,
      ce('button', { className: 'btn-outline', onClick: () => setScreen('list'), style: { marginBottom: '20px' } }, "← Lista"),
      ce('h2', null, activeCustomer.name),
      
      activeCustomer.rooms.map((room, rIdx) => ce('div', { key: rIdx, className: 'card' },
        ce('div', { className: 'flex-row room-header' },
          ce('strong', null, "🛋️ " + room.name),
          ce('span', { style: { fontWeight: 800 } }, Math.round(room.items.reduce((s, i) => s + i.price, 0)) + " zł")
        ),
        room.items.map((item, iIdx) => ce('div', { key: iIdx, className: 'flex-row item-row' },
          ce('span', null, "📐 " + item.desc),
          ce('span', { style: { fontWeight: 600 } }, Math.round(item.price) + " zł")
        )),
        ce('button', { className: 'btn-secondary', style: { padding: '8px', fontSize: '12px' }, onClick: () => { setActiveRoomIdx(rIdx); setScreen('calc'); } }, "＋ Dodaj wycenę")
      )),

      ce('button', { className: 'btn btn-outline', style: { width: '100%' }, onClick: addRoom }, "＋ Dodaj pokój"),
      
      ce('div', { className: 'card', style: { background: 'var(--primary)', color: 'white', marginTop: '30px', textAlign: 'center' } },
        ce('div', { style: { fontSize: '12px', opacity: 0.8 } }, "SUMA CAŁKOWITA"),
        ce('div', { style: { fontSize: '32px', fontWeight: 900 } }, Math.round(total) + " zł")
      )
    );
  }

  // WIDOK 3: KALKULATOR
  if (screen === 'calc') {
    const price = (calc.w * calc.h * 0.025); // Tu wejdą tabele

    return ce('div', null,
      ce('button', { className: 'btn-outline', onClick: () => setScreen('details'), style: { marginBottom: '20px' } }, "← Wróć"),
      ce('h2', null, "Nowa wycena"),
      
      ce('div', { className: 'card' },
        ce('div', { className: 'input-group' },
          ce('label', null, "Produkt"),
          ce('select', { value: calc.cat, onChange: (e) => setCalc({ ...calc, cat: e.target.value }) },
            ce('option', null, "Drewno 50mm"),
            ce('option', null, "Bambus 50mm"),
            ce('option', null, "Aluminium 25mm")
          )
        ),
        ce('div', { className: 'flex-row', style: { gap: '15px' } },
          ce('div', { className: 'input-group', style: { flex: 1 } },
            ce('label', null, "Szerokość (cm)"),
            ce('input', { type: 'number', value: calc.w, onChange: (e) => setCalc({ ...calc, w: e.target.value }) })
          ),
          ce('div', { className: 'input-group', style: { flex: 1 } },
            ce('label', null, "Wysokość (cm)"),
            ce('input', { type: 'number', value: calc.h, onChange: (e) => setCalc({ ...calc, h: e.target.value }) })
          )
        ),
        ce('div', { className: 'price-tag' }, Math.round(price) + " zł"),
        ce('button', { className: 'btn btn-main', onClick: () => {
          setCustomers(customers.map(c => {
            if(c.id === activeCustId) {
              const newRooms = [...c.rooms];
              newRooms[activeRoomIdx].items.push({ desc: `${calc.cat} ${calc.w}x${calc.h}`, price });
              return { ...c, rooms: newRooms };
            }
            return c;
          }));
          setScreen('details');
        } }, "💾 Zapisz do pokoju")
      )
    );
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(ce(App));
</script>
</body>
</html>
