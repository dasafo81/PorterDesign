<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porter Design - Kalkulator Premium</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .gold-accent { color: #c5a059; }
        .bg-gold { background-color: #c5a059; }
        .border-gold { border-color: #c5a059; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; }
        input, select { background: #262626; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; font-size: 14px; }
        input:focus, select:focus { border-color: #c5a059; outline: none; }
        .sidebar-item { transition: all 0.2s; cursor: pointer; border-radius: 8px; padding: 12px; margin-bottom: 4px; }
        .sidebar-item:hover { background: #262626; color: #c5a059; }
        .sidebar-item.active { background: #c5a059; color: black; font-weight: 600; }
        .btn-primary { background: #c5a059; color: black; font-weight: 600; padding: 12px; border-radius: 8px; transition: opacity 0.2s; }
        .btn-primary:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- DANE KONFIGURACYJNE Z PLIKÓW ---
        const FABRICS = [
            { name: "Belluno", price: 70, height: 300 },
            { name: "Bercy FR", price: 264, height: 303 },
            { name: "Berin", price: 110, height: 300 },
            { name: "Betty 148", price: 60, height: 315 },
            { name: "Billy Dim-Out", price: 195, height: 295 },
            { name: "Basic Tkanina", price: 160, height: 300 },
            { name: "Standard Tkanina", price: 190, height: 300 },
            { name: "Premium Tkanina", price: 220, height: 300 }
        ];

        const SEWING_PRICES = { flex: 100, wave: 110 };
        const GATHERING_MULTIPLIERS = { "150%": 1.5, "200%": 2.0, "250%": 2.5 };

        const KAES_WAVE_PRICES = {
            white: { 100: 124.74, 150: 173.28, 200: 221.76, 250: 287.60, 300: 336.12, 350: 384.64 },
            black: { 100: 143.46, 150: 197.16, 200: 221.76, 250: 327.12, 300: 380.80, 350: 434.48 }
        };

        const ELECTRIC_RAILS = {
            slim: { 150: 658, 200: 704, 250: 750, 300: 816, 350: 862, 400: 952, 450: 1016, 500: 1108 },
            universal: { 150: 648, 200: 722, 250: 796, 300: 880, 350: 954, 400: 1028, 450: 1092, 500: 1166 }
        };

        const MOTORS = [
            { id: "am75", name: "AM75 (Sieciowy A-OK)", price: 644 },
            { id: "am50", name: "AM50 (Akumulatorowy A-OK)", price: 1000 },
            { id: "movelite35", name: "Movelite 35 RTS (Somfy)", price: 1056 },
            { id: "glydea", name: "Glydea Ultra 35 RTS", price: 2268 }
        ];

        function App() {
            const [activeCategory, setActiveCategory] = useState('curtains');
            const [searchQuery, setSearchQuery] = useState('');
            const [config, setConfig] = useState({
                width: 150, height: 250, 
                gathering: '200%', sewing: 'flex', 
                fabricPrice: 160, customPrice: false,
                kaesType: 'flex', kaesColor: 'white',
                motorId: 'am75', railType: 'slim'
            });

            // Obliczenia
            const result = useMemo(() => {
                if (activeCategory === 'curtains') {
                    const gather = GATHERING_MULTIPLIERS[config.gathering];
                    const fabricNeeded = (config.width / 100 * gather) + 0.2; // mb
                    const unitPrice = parseFloat(config.fabricPrice) + SEWING_PRICES[config.sewing];
                    const total = fabricNeeded * unitPrice;
                    return { total: total.toFixed(2), detail: `${fabricNeeded.toFixed(2)} mb tkaniny` };
                }
                
                if (activeCategory === 'kaes') {
                    if (config.kaesType === 'flex') {
                        const total = (config.width / 100) * 80;
                        return { total: total.toFixed(2), detail: "System Flex (80zł/mb)" };
                    } else {
                        const roundedWidth = Math.ceil(config.width / 50) * 50;
                        const total = KAES_WAVE_PRICES[config.kaesColor][roundedWidth] || (config.width * 2.5);
                        return { total: total.toFixed(2), detail: `System Wave (${config.kaesColor})` };
                    }
                }

                if (activeCategory === 'electric') {
                    const roundedWidth = Math.ceil(config.width / 50) * 50;
                    const railPrice = (ELECTRIC_RAILS[config.railType][roundedWidth] || 1000);
                    const motor = MOTORS.find(m => m.id === config.motorId);
                    const total = railPrice + motor.price;
                    return { total: total.toFixed(2), detail: `Szyna ${config.railType.toUpperCase()} + silnik ${motor.name}` };
                }

                if (activeCategory === 'blinds') {
                    const area = (config.width * config.height) / 10000;
                    const base = area * 350; // uproszczony model ceny bazowej dla żaluzji
                    let warning = area > 5 ? "Uwaga: Ograniczona gwarancja (duża powierzchnia)!" : "";
                    return { total: base.toFixed(2), detail: `${area.toFixed(2)} m², ${warning}` };
                }

                return { total: 0, detail: '' };
            }, [activeCategory, config]);

            const filteredFabrics = FABRICS.filter(f => f.name.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-64 bg-black p-6 border-r border-zinc-800">
                        <div className="mb-10 text-center">
                            <h1 className="text-xl font-bold tracking-widest gold-accent uppercase">Porter Design</h1>
                            <p className="text-[10px] text-zinc-500 mt-1">SYSTEM KONFIGURACJI PREMIUM</p>
                        </div>
                        
                        <nav>
                            <div className={`sidebar-item ${activeCategory === 'curtains' ? 'active' : ''}`} onClick={() => setActiveCategory('curtains')}>
                                <i className="fa-solid fa-scroll mr-3"></i> Zasłony / Firany
                            </div>
                            <div className={`sidebar-item ${activeCategory === 'blinds' ? 'active' : ''}`} onClick={() => setActiveCategory('blinds')}>
                                <i className="fa-solid fa-border-all mr-3"></i> Żaluzje
                            </div>
                            <div className={`sidebar-item ${activeCategory === 'kaes' ? 'active' : ''}`} onClick={() => setActiveCategory('kaes')}>
                                <i className="fa-solid fa-grip-lines mr-3"></i> Szyny KAES
                            </div>
                            <div className={`sidebar-item ${activeCategory === 'electric' ? 'active' : ''}`} onClick={() => setActiveCategory('electric')}>
                                <i className="fa-solid fa-plug-circle-bolt mr-3"></i> Karnisze Elektr.
                            </div>
                        </nav>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-y-auto p-8 bg-[#0d0d0d]">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
                                <h2 className="text-2xl font-light">Konfigurator: <span className="font-semibold gold-accent">
                                    {activeCategory === 'curtains' ? 'Zasłony i Firany' : activeCategory === 'blinds' ? 'Żaluzje' : activeCategory === 'kaes' ? 'Szyny KAES' : 'Karnisze Elektryczne'}
                                </span></h2>
                                <div className="text-right">
                                    <p className="text-xs text-zinc-500">ID PROJEKTU: 2024/03/PD</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {/* Lewa Kolumna - Parametry */}
                                <div className="card p-6 space-y-6">
                                    <div className="section-title text-sm font-bold text-zinc-400 uppercase tracking-tighter mb-2 border-l-2 border-gold pl-3">Wymiary i Wykończenie</div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="flex flex-col">
                                            <label className="text-xs mb-1 text-zinc-400">Szerokość (cm)</label>
                                            <input type="number" value={config.width} onChange={(e) => setConfig({...config, width: e.target.value})} />
                                        </div>
                                        <div className="flex flex-col">
                                            <label className="text-xs mb-1 text-zinc-400">Wysokość (cm)</label>
                                            <input type="number" value={config.height} onChange={(e) => setConfig({...config, height: e.target.value})} />
                                        </div>
                                    </div>

                                    {activeCategory === 'curtains' && (
                                        <>
                                            <div className="flex flex-col">
                                                <label className="text-xs mb-1 text-zinc-400">Rodzaj Szycia</label>
                                                <select value={config.sewing} onChange={(e) => setConfig({...config, sewing: e.target.value})}>
                                                    <option value="flex">Szycie FLEX (100 zł/mb)</option>
                                                    <option value="wave">Szycie WAVE (110 zł/mb)</option>
                                                </select>
                                            </div>
                                            <div className="flex flex-col">
                                                <label className="text-xs mb-1 text-zinc-400">Marszczenie</label>
                                                <select value={config.gathering} onChange={(e) => setConfig({...config, gathering: e.target.value})}>
                                                    <option value="150%">150% (x1.5)</option>
                                                    <option value="200%">200% (x2.0)</option>
                                                    <option value="250%">250% (x2.5)</option>
                                                </select>
                                            </div>
                                        </>
                                    )}

                                    {activeCategory === 'kaes' && (
                                        <>
                                            <div className="flex flex-col">
                                                <label className="text-xs mb-1 text-zinc-400">System</label>
                                                <select value={config.kaesType} onChange={(e) => setConfig({...config, kaesType: e.target.value})}>
                                                    <option value="flex">System Flex (Ręczny)</option>
                                                    <option value="wave">System Wave (Ręczny)</option>
                                                </select>
                                            </div>
                                            <div className="flex flex-col">
                                                <label className="text-xs mb-1 text-zinc-400">Kolor Szyny</label>
                                                <select value={config.kaesColor} onChange={(e) => setConfig({...config, kaesColor: e.target.value})}>
                                                    <option value="white">Biały</option>
                                                    <option value="black">Czarny</option>
                                                </select>
                                            </div>
                                        </>
                                    )}

                                    {activeCategory === 'electric' && (
                                        <>
                                            <div className="flex flex-col">
                                                <label className="text-xs mb-1 text-zinc-400">Model Szyny</label>
                                                <select value={config.railType} onChange={(e) => setConfig({...config, railType: e.target.value})}>
                                                    <option value="slim">Model SLIM</option>
                                                    <option value="universal">Model UNIVERSAL</option>
                                                </select>
                                            </div>
                                            <div className="flex flex-col">
                                                <label className="text-xs mb-1 text-zinc-400">Napęd (Silnik)</label>
                                                <select value={config.motorId} onChange={(e) => setConfig({...config, motorId: e.target.value})}>
                                                    {MOTORS.map(m => <option key={m.id} value={m.id}>{m.name} - {m.price} zł</option>)}
                                                </select>
                                            </div>
                                        </>
                                    )}
                                </div>

                                {/* Prawa Kolumna - Tkanina i Wynik */}
                                <div className="space-y-6">
                                    {(activeCategory === 'curtains') && (
                                        <div className="card p-6">
                                            <div className="section-title text-sm font-bold text-zinc-400 uppercase tracking-tighter mb-4 border-l-2 border-gold pl-3">Katalog Tkanin</div>
                                            <div className="relative mb-4">
                                                <i className="fa-solid fa-search absolute left-3 top-3.5 text-zinc-500"></i>
                                                <input 
                                                    type="text" 
                                                    placeholder="Szukaj tkaniny (np. Belluno)..." 
                                                    className="w-full pl-10"
                                                    value={searchQuery}
                                                    onChange={(e) => setSearchQuery(e.target.value)}
                                                />
                                            </div>
                                            
                                            <div className="max-h-40 overflow-y-auto mb-4 border border-zinc-800 rounded-lg">
                                                {filteredFabrics.map(f => (
                                                    <div 
                                                        key={f.name}
                                                        className={`p-2 text-sm cursor-pointer border-b border-zinc-800 hover:bg-zinc-800 flex justify-between ${config.fabricPrice === f.price && !config.customPrice ? 'bg-zinc-800 text-gold-accent' : ''}`}
                                                        onClick={() => { setConfig({...config, fabricPrice: f.price, customPrice: false}); setSearchQuery(f.name); }}
                                                    >
                                                        <span>{f.name}</span>
                                                        <span className="font-semibold">{f.price} zł/mb</span>
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="flex items-center space-x-2">
                                                <input 
                                                    type="checkbox" 
                                                    checked={config.customPrice} 
                                                    onChange={(e) => setConfig({...config, customPrice: e.target.checked})}
                                                    className="w-4 h-4"
                                                />
                                                <label className="text-xs text-zinc-400">Wpisz własną cenę</label>
                                                {config.customPrice && (
                                                    <input 
                                                        type="number" 
                                                        placeholder="Cena za mb" 
                                                        className="ml-2 w-24 h-8 text-xs"
                                                        onChange={(e) => setConfig({...config, fabricPrice: e.target.value})}
                                                    />
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* Podsumowanie */}
                                    <div className="card p-6 border-gold shadow-2xl bg-gradient-to-br from-[#1a1a1a] to-[#262626]">
                                        <div className="text-zinc-400 text-xs uppercase tracking-widest mb-1">Cena Całkowita Brutto</div>
                                        <div className="text-4xl font-bold gold-accent mb-4">{result.total} <span className="text-lg">zł</span></div>
                                        <div className="text-xs text-zinc-500 italic mb-6">
                                            {result.detail}
                                        </div>
                                        <button className="btn-primary w-full">
                                            <i className="fa-solid fa-file-invoice mr-2"></i> DODAJ DO OFERTY
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
