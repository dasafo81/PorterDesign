<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porter Design - System Ofertowy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-chip { background-color: #f0fdf4 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: bold; box-shadow: 0 0 0 1px #22c55e; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } body { background: white; padding: 0; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-40 text-slate-800">

    <div class="max-w-3xl mx-auto p-4 space-y-6">
        <header class="bg-white p-6 rounded-[2rem] shadow-sm border no-print flex justify-between items-center">
            <div class="flex-1 mr-4">
                <h1 class="text-2xl font-black text-green-700 italic leading-none">PORTER DESIGN</h1>
                <input type="text" id="client-input" placeholder="Klient / Inwestycja" class="mt-2 text-lg border-b-2 border-slate-100 outline-none focus:border-green-500 w-full bg-transparent py-1 transition-all">
            </div>
            <button onclick="addRoom()" class="bg-green-600 text-white px-6 py-4 rounded-2xl font-bold shadow-lg shadow-green-100 hover:bg-green-700 active:scale-95 transition-all whitespace-nowrap">
                <i class="fas fa-plus mr-2"></i> Dodaj Pokój
            </button>
        </header>

        <div id="rooms-container" class="space-y-10"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.08)] z-50 no-print">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em]">Suma całkowita oferty</p>
                <p id="grand-total" class="text-4xl font-black text-green-600 tracking-tighter">0,00 zł</p>
            </div>
            <button onclick="window.print()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold flex items-center gap-3 hover:bg-black transition-all shadow-xl">
                <i class="fas fa-file-pdf"></i> GENERUJ PDF
            </button>
        </div>
    </div>

        let state = { rooms: [] };

        function addRoom() {
            const room = {
                id: Date.now(),
                name: "Nowe pomieszczenie",
                windows: []
            };
            state.rooms.push(room);
            render();
            addWindow(room.id);
        }

        function removeRoom(roomId) {
            state.rooms = state.rooms.filter(r => r.id !== roomId);
            render();
        }

        function addWindow(roomId) {
            const room = state.rooms.find(r => r.id === roomId);
            room.windows.push({
                id: Date.now() + Math.random(),
                type: 'Zasłony',
                szer: '',
                wys: '',
                szycie: 100, // Flex
                marsz: 1.5,
                kat: 160,
                total: 0
            });
            render();
        }

            const room = state.rooms.find(r => r.id === roomId);
            room.windows = room.windows.filter(w => w.id !== windowId);
            render();
        }
