<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Porter Design — Asystent Wycen</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-900: #1a3a08; --green-700: #27500A; --green-500: #3B6D11;
      --green-300: #97C459; --green-100: #EAF3DE; --grey-900: #1C1C1C;
      --grey-500: #6B6B6B; --grey-100: #E8E8E8; --white: #FFFFFF;
      --radius-lg: 24px; --radius-md: 16px; --font-main: 'DM Sans', sans-serif;
    }
    body { font-family: var(--font-main); background: #f8f9f5; color: var(--grey-900); line-height: 1.5; }
    .btn { cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
    input { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- GŁÓWNA APLIKACJA ---
    function PorterApp() {
      const [screen, setScreen] = useState('home'); // home, rooms, summary
      const [client, setClient] = useState({ name: '', address: '' });
      const [rooms, setRooms] = useState([]);
      const [activeRoomIndex, setActiveRoomIndex] = useState(null);

      const addRoom = (name) => {
        setRooms([...rooms, { name, windows: [] }]);
        setScreen('rooms');
      };

      const addWindow = (roomIndex) => {
          const newRooms = [...rooms];
          newRooms[roomIndex].windows.push({
              id: Date.now(),
              type: 'Zasłony',
              width: '',
              height: '',
              fabric: 'Standard',
              price: 0
          });
          setRooms(newRooms);
      };

      const updateWindow = (rIdx, wIdx, field, value) => {
          const newRooms = [...rooms];
          newRooms[rIdx].windows[wIdx][field] = value;
          // Prosta logika ceny dla testu
          const w = parseFloat(newRooms[rIdx].windows[wIdx].width) || 0;
          newRooms[rIdx].windows[wIdx].price = w * 2.5; 
          setRooms(newRooms);
      };

      const grandTotal = rooms.reduce((sum, room) => 
        sum + room.windows.reduce((wSum, w) => wSum + (w.price || 0), 0), 0
      );

      return (
        <div style={{maxWidth: 500, margin: '0 auto', padding: 20}}>
          {screen === 'home' && (
            <div style={{textAlign: 'center', marginTop: 100}}>
              <h1 style={{color: 'var(--green-700)', fontSize: 32, marginBottom: 10}}>PORTER DESIGN</h1>
              <p style={{color: 'var(--grey-500)', marginBottom: 40}}>System Zarządzania Ofertami</p>
              <input 
                style={{width: '100%', padding: 15, borderRadius: 15, border: '1px solid #ddd', marginBottom: 10}}
                placeholder="Imię i Nazwisko klienta"
                value={client.name}
                onChange={(e) => setClient({...client, name: e.target.value})}
              />
              <button 
                onClick={() => addRoom('Salon')}
                style={{width: '100%', padding: 15, background: 'var(--green-700)', color: 'white', borderRadius: 15, fontWeight: 'bold'}}
              >
                Rozpocznij nową wizytę
              </button>
            </div>
          )}

          {screen === 'rooms' && (
            <div>
              <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20}}>
                <h2 style={{fontSize: 18}}>Pokoje i okna</h2>
                <button onClick={() => setScreen('summary')} style={{color: 'var(--green-700)', fontWeight: 'bold'}}>Podsumowanie ({Math.round(grandTotal)} zł)</button>
              </div>

              {rooms.map((room, rIdx) => (
                <div key={rIdx} style={{background: 'white', padding: 20, borderRadius: 25, marginBottom: 20, boxShadow: '0 4px 10px rgba(0,0,0,0.05)'}}>
                  <h3 style={{marginBottom: 15, color: 'var(--green-700)'}}>{room.name}</h3>
                  {room.windows.map((win, wIdx) => (
                    <div key={win.id} style={{background: '#f9f9f9', padding: 15, borderRadius: 15, marginBottom: 10}}>
                        <div style={{display: 'flex', gap: 10, marginBottom: 10}}>
                            <input placeholder="Szerokość" style={{width: '50%', padding: 8}} onChange={(e) => updateWindow(rIdx, wIdx, 'width', e.target.value)} />
                            <input placeholder="Wysokość" style={{width: '50%', padding: 8}} onChange={(e) => updateWindow(rIdx, wIdx, 'height', e.target.value)} />
                        </div>
                        <div style={{fontSize: 12, color: 'var(--green-700)', fontWeight: 'bold'}}>Wycena okna: {win.price} zł</div>
                    </div>
                  ))}
                  <button onClick={() => addWindow(rIdx)} style={{fontSize: 13, color: 'var(--green-500)'}}>+ Dodaj okno</button>
                </div>
              ))}
              
              <button onClick={() => addRoom('Kolejny pokój')} style={{width: '100%', padding: 15, border: '2px dashed #ccc', borderRadius: 20, color: '#888'}}>+ Dodaj pomieszczenie</button>
            </div>
          )}

          {screen === 'summary' && (
            <div style={{background: 'white', padding: 30, borderRadius: 30}}>
                <h2 style={{marginBottom: 20}}>Podsumowanie dla: {client.name}</h2>
                <div style={{fontSize: 24, fontWeight: 'bold', color: 'var(--green-700)', marginBottom: 20}}>Razem: {grandTotal} zł</div>
                <button onClick={() => window.print()} style={{width: '100%', padding: 15, background: '#1c1c1c', color: 'white', borderRadius: 15}}>Generuj PDF</button>
                <button onClick={() => setScreen('rooms')} style={{width: '100%', marginTop: 10, color: '#888'}}>Wróć do edycji</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PorterApp />);
  </script>
</body>
</html>
