<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Porter Design - Kalkulator</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#ffffff;--bg2:#f7f7f5;
      --bd1:#d0d0cc;--bd2:#e0e0dc;--bd3:#ececea;
      --t1:#1a1a18;--t2:#6b6b66;--t3:#a0a09c;
      --gr:#3B6D11;--grl:#EAF3DE;--grd:#27500A;--grm:#97C459;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--t1);min-height:100vh;}
    #root{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;padding:1rem;}
    input,select,button{font-family:inherit;}
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
(function(){
"use strict";
var ce=React.createElement,useState=React.useState,Fragment=React.Fragment;

// --- DANE ---
var FABRICS=[
  {name:"Alise",brutto:230},{name:"Alma",brutto:165},{name:"Altamira",brutto:250},
  {name:"Alto",brutto:120},{name:"Amber",brutto:110},{name:"Antonio",brutto:220}
];

var MY_DATA = "PD Porter Design Paulina Porter\nul. Woronieckiego 6C/2, 05-220 Zielonka\nNIP: 8121803400";
var LOGO_URL = "https://i.imgur.com/x06W7Mh.png"; 

// --- LOGIKA ---
function calc(p){
  var c=p.c||{}, par=p.par||{};
  var pricePerMb = p.fabMan ? parseFloat(p.fabMan) : (p.fabP ? parseFloat(p.fabP) : 0);
  var total=0, lines=[];

  if(p.type==="zaslona" || p.type==="firana"){
    var w = parseFloat(par.wCm) || 0;
    var h = parseFloat(par.hCm) || 0;
    var m = parseFloat(c.mars) || 1.5;
    if(w > 0 && pricePerMb > 0){
      var mb = parseFloat(((w / 100) * m + 0.2).toFixed(2));
      total = mb * (pricePerMb + 100);
      lines.push("Wymiar: "+w+"x"+h+" cm, Zużycie: "+mb+"mb");
    }
  } else if(p.type==="szyna"){
    var l = parseFloat(par.len) || 0;
    if(l > 0) total = (l / 100) * 80;
  } else if(p.type==="zaluzja" || p.type==="roleta"){
    var w=parseFloat(par.wCm)||0, h=parseFloat(par.hCm)||0;
    var m2=Math.max(0.5, (w/100)*(h/100));
    total=m2*450;
  }
  return {total: total, lines: lines};
}

// --- UI ---
var IST={padding:"8px",fontSize:"14px",border:"1px solid var(--bd2)",borderRadius:"6px",width:"100%",marginBottom:"8px"};

function Btn(label,onClick,pri){
  return ce("button",{onClick:onClick,style:{padding:"8px 16px",borderRadius:8,border:"none",background:pri?"var(--gr)":"var(--bd3)",color:pri?"#fff":"#000",fontWeight:600,cursor:"pointer"}},label);
}

function ProdCard(p){
  var pr=p.prod, c=pr.c||{}, par=pr.par||{};
  var res=calc(pr);
  var types=[{id:"zaslona",l:"Zasłona"},{id:"firana",l:"Firana"},{id:"zaluzja",l:"Żaluzja"},{id:"szyna",l:"Szyna"}];

  return ce("div",{style:{background:"#fff",border:"1px solid var(--bd3)",borderRadius:12,padding:12,marginBottom:10}},
    ce("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:10}},
       ce("b",{},"Produkt"),ce("button",{onClick:p.onRemove,style:{color:"red",border:"none",background:"none"}},"usuń")),
    ce("div",{style:{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}},
       types.map(t=>ce("button",{key:t.id,onClick:()=>p.onChange({...pr,type:t.id,fabP:0,fabMan:"",fabName:""}),style:{fontSize:10,padding:"4px 8px",background:pr.type===t.id?"var(--grl)":"#fff",border:"1px solid var(--bd2)",borderRadius:10}},t.l))),
    
    pr.type!=="szyna" && ce("div",{style:{display:"flex",gap:5}},
       ce("input",{placeholder:"Szer (cm)",value:par.wCm||"",type:"number",onChange:e=>p.onChange({...pr,par:{...par,wCm:e.target.value}}),style:IST}),
       ce("input",{placeholder:"Wys (cm)",value:par.hCm||"",type:"number",onChange:e=>p.onChange({...pr,par:{...par,hCm:e.target.value}}),style:IST})),
    
    pr.type==="szyna" && ce("input",{placeholder:"Długość (cm)",value:par.len||"",type:"number",onChange:e=>p.onChange({...pr,par:{...par,len:e.target.value}}),style:IST}),

    (pr.type==="zaslona"||pr.type==="firana") && ce(Fragment,null,
       ce("select",{value:c.mars||"1.5",onChange:e=>p.onChange({...pr,c:{...c,mars:e.target.value}}),style:IST},
          ce("option",{value:"1.5"},"Marszczenie 150%"),ce("option",{value:"2.0"},"Marszczenie 200%")),
       ce("select",{value:pr.fabName||"",onChange:e=>{
          var f=FABRICS.find(x=>x.name===e.target.value);
          p.onChange({...pr,fabName:f?f.name:"",fabP:f?f.brutto:0,fabMan:""});
       },style:IST},
          ce("option",{value:""},"--- wybierz tkaninę ---"),
          FABRICS.map(f=>ce("option",{key:f.name,value:f.name},f.name+" ("+f.brutto+"zł)"))),
       ce("input",{placeholder:"LUB własna cena mb",value:pr.fabMan||"",type:"number",onChange:e=>p.onChange({...pr,fabMan:e.target.value,fabName:"",fabP:0}),style:IST})),
    
    ce("div",{style:{padding:8,background:"var(--grl)",borderRadius:8,fontSize:12,fontWeight:700}},"Suma: "+Math.round(res.total)+" zł")
  );
}

// --- APP ---
function App(){
  var [screen,setScreen]=useState("home");
  var [clients,setClients]=useState([]);
  var [cId,setCId]=useState(null);
  var [rId,setRId]=useState(null);
  var [curWin,setCurWin]=useState(null);
  var [modal,setModal]=useState(null);

  var client = clients.find(c=>c.id===cId);
  var room = client ? client.rooms.find(r=>r.id===rId) : null;

  function pdf(){
    var {jsPDF}=window.jspdf; var doc=new jsPDF();
    var img=new Image(); img.src=LOGO_URL;
    img.onload=function(){
      doc.addImage(img,'PNG',150,10,40,20);
      doc.setFontSize(8); doc.text(MY_DATA,10,15);
      doc.line(10,32,200,32);
      doc.setFontSize(14); doc.text("OFERTA: "+client.name,10,42);
      var y=55; var total=0;
      client.rooms.forEach(r=>{
        doc.setFontSize(12); doc.text(r.name.toUpperCase(),10,y); y+=7;
        r.windows.forEach(w=>{
          var wt=w.products.reduce((a,p)=>a+calc(p).total,0);
          doc.setFontSize(10); doc.text("- "+w.name+": "+Math.round(wt)+" zł",15,y); y+=6;
          total+=wt;
        });
        y+=5;
      });
      doc.setFontSize(14); doc.text("SUMA: "+Math.round(total)+" zł",10,y+5);
      doc.save("Wycena.pdf");
    };
  }

  function Modal(){
    var [v1,setV1]=useState(""); var [v2,setV2]=useState("");
    return ce("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}},
      ce("div",{style:{background:"#fff",padding:20,borderRadius:15,width:280}},
        ce("input",{placeholder:"Nazwa",value:v1,onChange:e=>setV1(e.target.value),style:IST,autoFocus:true}),
        modal==="client" && ce("input",{placeholder:"Adres",value:v2,onChange:e=>setV2(e.target.value),style:IST}),
        ce("div",{style:{display:"flex",gap:10}},
          Btn("Dodaj",()=>{
            if(modal==="client"){ 
              var nc={id:Date.now(),name:v1||"Klient",addr:v2,rooms:[]};
              setClients(p=>[...p,nc]); setCId(nc.id); setScreen("rooms");
            }
            if(modal==="room") setClients(p=>p.map(c=>c.id===cId?{...c,rooms:[...c.rooms,{id:Date.now(),name:v1||"Pokój",windows:[]}]}:c));
            if(modal==="win"){ setCurWin({id:Date.now(),name:v1||"Okno",products:[]}); setScreen("detail"); }
            setModal(null);
          },true),
          Btn("Anuluj",()=>setModal(null))
        )
      )
    );
  }

  var view=null;
  if(screen==="home") view=ce("div",null,
    ce("h2",{style:{marginBottom:15}},"Moi Klienci"),
    clients.map(c=>ce("div",{key:c.id,onClick:()=>{setCId(c.id);setScreen("rooms")},style:{padding:15,background:"#fff",border:"1px solid var(--bd3)",borderRadius:12,marginBottom:10}},ce("b",null,c.name))),
    Btn("+ Nowy Klient",()=>setModal("client"),true)
  );
  else if(screen==="rooms") view=ce("div",null,
    ce("h2",null,client.name),
    ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,margin:"15px 0"}},
      client.rooms.map(r=>ce("div",{key:r.id,onClick:()=>{setRId(r.id);setScreen("windows")},style:{padding:15,background:"var(--grl)",borderRadius:12,textAlign:"center"}},r.name)),
      ce("div",{onClick:()=>setModal("room"),style:{padding:15,border:"2px dashed var(--bd2)",borderRadius:12,textAlign:"center"}},"+ Pokój")),
    ce("div",{style:{display:"flex",gap:10}},Btn("PDF",pdf,true),Btn("Wstecz",()=>setScreen("home")))
  );
  else if(screen==="windows") view=ce("div",null,
    ce("h2",null,room.name),
    room.windows.map(w=>ce("div",{key:w.id,onClick:()=>{setCurWin(w);setScreen("detail")},style:{padding:12,background:"#fff",border:"1px solid var(--bd3)",borderRadius:10,marginBottom:10}},w.name)),
    ce("div",{style:{display:"flex",gap:10}},Btn("+ Okno",()=>setModal("win"),true),Btn("Wstecz",()=>setScreen("rooms")))
  );
  else if(screen==="detail") view=ce("div",null,
    ce("h2",null,curWin.name),
    curWin.products.map((p,i)=>ce(ProdCard,{key:p.id,prod:p,onRemove:()=>setCurWin({...curWin,products:curWin.products.filter((_,j)=>j!==i)}),onChange:np=>setCurWin({...curWin,products:curWin.products.map((x,j)=>j===i?np:x)})})),
    ce("div",{style:{display:"flex",gap:10,marginTop:15}},
      Btn("+ Produkt",()=>setCurWin({...curWin,products:[...curWin.products,{id:Date.now(),type:"zaslona",par:{},c:{}} ]})),
      Btn("Zapisz",()=>{
        setClients(p=>p.map(c=>c.id===cId?{...c,rooms:c.rooms.map(r=>r.id===rId?{...r,windows:r.windows.find(w=>w.id===curWin.id)?r.windows.map(w=>w.id===curWin.id?curWin:w):[...r.windows,curWin]}:r)}:c));
        setScreen("windows");
      },true)
    )
  );

  return ce("div",null,view,modal&&ce(Modal));
}
ReactDOM.createRoot(document.getElementById("root")).render(ce(App));
})();
</script>
</body>
</html>
