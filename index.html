<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Porter Design - Kalkulator</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#ffffff;--bg2:#f7f7f5;
      --bd1:#d0d0cc;--bd2:#e0e0dc;--bd3:#ececea;
      --t1:#1a1a18;--t2:#6b6b66;--t3:#a0a09c;
      --gr:#3B6D11;--grl:#EAF3DE;--grd:#27500A;--grm:#97C459;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--t1);min-height:100vh;}
    #root{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;padding:1rem;}
    input,select,button{font-family:inherit;}
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
(function(){
"use strict";
var ce=React.createElement,useState=React.useState,Fragment=React.Fragment;

// --- DANE KATALOGOWE ---
var FABRICS=[
  {name:"Alise",brutto:230,prod:"FIBERO",width:300},
  {name:"Alma",brutto:165,prod:"Ridex",width:315},
  {name:"Altamira",brutto:250,prod:"OZLEM",width:300},
  {name:"Alto",brutto:120,prod:"VV design",width:370},
  {name:"Amber",brutto:110,prod:"SAMA",width:300},
  {name:"Antonio",brutto:220,prod:"MARGO",width:300}
];

var PROD_TYPES=[
  {id:"zaslona",label:"Zasłona"},{id:"firana",label:"Firana"},
  {id:"zaluzja",label:"Żaluzja"},{id:"roleta",label:"Roleta"},
  {id:"szyna",label:"Szyna KAES"}
];

var RCITY={80:83.8,100:90.78,120:107.57,140:114.57,160:121.55,180:135.87,200:149.79,300:216.67};
var KW={biala:{100:124,200:221,300:336,400:443,500:561,600:661},czarna:{100:143,200:221,300:380,400:501,500:636,600:748}};

var MY_DATA = "PD Porter Design Paulina Porter\nul. Woronieckiego 6C/2, 05-220 Zielonka\nNIP: 8121803400";
var LOGO_URL = "https://i.imgur.com/x06W7Mh.png"; 

// --- LOGIKA OBLICZEŃ (POPRAWIONA) ---
function calc(p){
  var c=p.c||{}, par=p.par||{};
  // Priorytet dla własnej ceny wpisanej ręcznie
  var pricePerMb = p.fabMan ? parseFloat(p.fabMan) : (p.fabP ? parseFloat(p.fabP) : 0);
  var total=0, lines=[];

  if(p.type==="zaslona" || p.type==="firana"){
    var wCm = parseFloat(par.wCm) || 0;
    var marszczenie = parseFloat(c.mars) || 1.5;
    
    if(wCm > 0 && pricePerMb > 0){
      // mb = (szerokość / 100 * marszczenie) + 20cm zapasu
      var mb = parseFloat(((wCm / 100) * marszczenie + 0.2).toFixed(2));
      var kosztTkaniny = mb * pricePerMb;
      var kosztSzycia = mb * 100; // Stała stawka 100zł/mb szycia
      
      total = kosztTkaniny + kosztSzycia;
      lines.push("Zużycie: " + mb + " mb");
      lines.push("Tkanina: " + kosztTkaniny.toFixed(2) + " zł");
      lines.push("Szycie: " + kosztSzycia.toFixed(2) + " zł");
    }
  } else if(p.type==="szyna"){
    var len = parseFloat(par.len) || 0;
    if(len > 0) {
        total = (len / 100) * 80;
        lines.push("Szyna: " + (len/100).toFixed(2) + " mb");
    }
  } else if(p.type==="zaluzja"){
    var w=parseFloat(par.wCm)||0, h=parseFloat(par.hCm)||0;
    var m2=Math.max(0.5, (w/100)*(h/100));
    total=m2*450;
    lines.push("Powierzchnia: " + m2.toFixed(2) + " m2");
  }
  return {total: total, lines: lines};
}

// --- KOMPONENTY UI ---
var IST={padding:"8px",fontSize:"14px",border:"1px solid var(--bd2)",borderRadius:"6px",background:"var(--bg)",width:"100%"};

function Btn(label,onClick,primary){
  return ce("button",{onClick:onClick,style:{padding:"8px 16px",borderRadius:"8px",border:"none",background:primary?"var(--gr)":"var(--bd3)",color:primary?"#fff":"var(--t1)",fontWeight:"600",cursor:"pointer"}},label);
}

function ProdCard(p){
  var prod=p.prod, c=prod.c||{}, par=prod.par||{};
  var res=calc(prod);

  return ce("div",{style:{background:"#fff",border:"1px solid var(--bd3)",borderRadius:"12px",padding:"12px",marginBottom:"10px"}},
    ce("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"10px"}},
      ce("b",{},(PROD_TYPES.find(t=>t.id===prod.type)||{}).label),
      ce("button",{onClick:p.onRemove,style:{border:"none",background:"none",color:"red",fontSize:"11px"}},"usuń")
    ),
    // Wybór typu
    ce("div",{style:{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"10px"}},
      PROD_TYPES.map(t=>ce("button",{onClick:()=>p.onChange({...prod,type:t.id,fabName:null,fabP:null,fabMan:null}),style:{fontSize:"10px",padding:"4px 8px",borderRadius:"10px",border:"1px solid var(--bd2)",background:prod.type===t.id?"var(--grl)":"#fff"}},t.label))
    ),
    // Formularz zasłony
    (prod.type==="zaslona" || prod.type==="firana") && ce(Fragment, null,
      ce("div",{style:{display:"flex",gap:"5px",marginBottom:"10px"}},
        ce("input",{type:"number",placeholder:"Szer. karnisza (cm)",value:par.wCm||"",onChange:e=>p.onChange({...prod,par:{...par,wCm:e.target.value}}),style:IST}),
        ce("select",{value:c.mars||"1.5",onChange:e=>p.onChange({...prod,c:{...c,mars:e.target.value}}),style:IST},
          ce("option",{value:"1.5"},"Marszcz. 150%"),
          ce("option",{value:"2.0"},"Marszcz. 200%")
        )
      ),
      ce("div",{style:{marginBottom:"10px"}},
        ce("label",{style:{fontSize:"11px",color:"var(--t2)"}},"Wybierz z katalogu:"),
        ce("select",{value:prod.fabName||"",onChange:e=>{
          var f=FABRICS.find(x=>x.name===e.target.value);
          p.onChange({...prod,fabName:f.name,fabP:f.brutto,fabMan:null});
        },style:IST},
          ce("option",{value:""},"--- wybierz tkaninę ---"),
          FABRICS.map(f=>ce("option",{key:f.name,value:f.name},f.name + " ("+f.brutto+"zł/mb)"))
        )
      ),
      ce("div",{},
        ce("label",{style:{fontSize:"11px",color:"var(--t2)"}},"LUB wpisz własną cenę mb:"),
        ce("input",{type:"number",placeholder:"np. 150",value:prod.fabMan||"",onChange:e=>p.onChange({...prod,fabMan:e.target.value,fabName:null,fabP:null}),style:IST})
      )
    ),
    // Wynik w karcie
    res.total > 0 && ce("div",{style:{marginTop:"10px",padding:"8px",background:"var(--grl)",borderRadius:"8px",fontSize:"12px"}},
      res.lines.map((l,i)=>ce("div",{key:i},l)),
      ce("div",{style:{fontWeight:"700",borderTop:"1px solid var(--grm)",marginTop:"5px",paddingTop:"5px"}},"Razem: "+Math.round(res.total)+" zł")
    )
  );
}

// --- GŁÓWNA APLIKACJA ---
function App(){
  var [screen,setScreen]=useState("home");
  var [clients,setClients]=useState([{id:1,name:"Przykład",addr:"Zielonka",rooms:[]}]);
  var [curCId,setCurCId]=useState(null);
  var [curRId,setCurRId]=useState(null);
  var [curWin,setCurWin]=useState(null);
  var [modal,setModal]=useState(null);

  var client=clients.find(c=>c.id===curCId);
  var room=client?client.rooms.find(r=>r.id===curRId):null;

  function generatePDF(){
    var {jsPDF}=window.jspdf; var doc=new jsPDF();
    var img=new Image(); img.src=LOGO_URL;
    img.onload=function(){
      doc.addImage(img,'PNG',150,10,45,20);
      doc.setFontSize(9); doc.setTextColor(100); doc.text(MY_DATA,10,15);
      doc.line(10,35,200,35);
      doc.setFontSize(14); doc.setTextColor(0); doc.text("OFERTA: "+client.name,10,45);
      doc.setFontSize(10); doc.text("Adres: "+client.addr,10,51);
      var y=65;
      var grand=0;
      client.rooms.forEach(r=>{
        doc.setFontSize(12); doc.text(r.name.toUpperCase(),10,y); y+=7;
        r.windows.forEach(w=>{
            var wTotal=w.products.reduce((acc,pr)=>acc+calc(pr).total,0);
            doc.setFontSize(10); doc.text("- "+w.name+": "+Math.round(wTotal)+" zl",15,y); y+=5;
            grand+=wTotal;
        });
        y+=5;
      });
      doc.setFontSize(14); doc.setTextColor(59,109,17);
      doc.text("SUMA CALKOWITA: "+Math.round(grand)+" zl",10,y+10);
      doc.save("Wycena_"+client.name+".pdf");
    };
  }

  // --- MODAL ---
  function ModalContent(){
    var [val,setVal]=useState("");
    var [val2,setVal2]=useState("");
    return ce("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}},
      ce("div",{style:{background:"#fff",padding:"20px",borderRadius:"15px",width:"280px"}},
        ce("h3",{style:{marginBottom:"10px",fontSize:"15px"}},"Dodaj"),
        ce("input",{autoFocus:true,value:val,onChange:e=>setVal(e.target.value),placeholder:"Nazwa",style:{...IST,marginBottom:"10px"}}),
        modal==="client" && ce("input",{value:val2,onChange:e=>setVal2(e.target.value),placeholder:"Adres",style:{...IST,marginBottom:"10px"}}),
        ce("div",{style:{display:"flex",gap:"10px"}},
          Btn("Dodaj",()=>{
            if(modal==="client"){
                var nc={id:Date.now(),name:val||"Klient",addr:val2,rooms:[]};
                setClients(p=>[...p,nc]); setCurCId(nc.id); setScreen("rooms");
            }
            if(modal==="room") setClients(p=>p.map(c=>c.id===curCId?{...c,rooms:[...c.rooms,{id:Date.now(),name:val,windows:[]}]}:c));
            if(modal==="win"){ setCurWin({id:Date.now(),name:val,products:[]}); setScreen("detail"); }
            setModal(null);
          },true),
          Btn("Anuluj",()=>setModal(null))
        )
      )
    );
  }

  var content=null;
  if(screen==="home") content=ce("div",null,
    ce("h2",{style:{marginBottom:"15px"}},"Klienci"),
    clients.map(c=>ce("div",{key:c.id,onClick:()=>{setCurCId(c.id);setScreen("rooms")},style:{padding:"15px",background:"#fff",borderRadius:"12px",marginBottom:"10px",border:"1px solid var(--bd3)",cursor:"pointer"}},ce("b",null,c.name))),
    Btn("+ Nowy Klient",()=>setModal("client"),true)
  );
  else if(screen==="rooms") content=ce("div",null,
    ce("h2",null,client.name),
    ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",margin:"15px 0"}},
      client.rooms.map(r=>ce("div",{key:r.id,onClick:()=>{setCurRId(r.id);setScreen("windows")},style:{padding:"15px",background:"var(--grl)",borderRadius:"12px",textAlign:"center",cursor:"pointer"}},r.name)),
      ce("div",{onClick:()=>setModal("room"),style:{padding:"15px",border:"2px dashed var(--bd2)",borderRadius:"12px",textAlign:"center",cursor:"pointer"}},"+ Pokój")
    ),
    ce("div",{style:{display:"flex",gap:"10px"}},Btn("PDF",generatePDF,true),Btn("Wstecz",()=>setScreen("home")))
  );
  else if(screen==="windows") content=ce("div",null,
    ce("h2",null,room.name),
    room.windows.map(w=>ce("div",{key:w.id,onClick:()=>{setCurWin(w);setScreen("detail")},style:{padding:"12px",background:"#fff",border:"1px solid var(--bd3)",borderRadius:"10px",marginBottom:"10px",cursor:"pointer"}},w.name)),
    ce("div",{style:{display:"flex",gap:"10px"}},Btn("+ Okno",()=>setModal("win"),true),Btn("Wstecz",()=>setScreen("rooms")))
  );
  else if(screen==="detail") content=ce("div",null,
    ce("h2",null,"Okno: "+curWin.name),
    curWin.products.map((p,i)=>ce(ProdCard,{key:p.id,prod:p,onRemove:()=>setCurWin({...curWin,products:curWin.products.filter((_,j)=>j!==i)}),onChange:np=>setCurWin({...curWin,products:curWin.products.map((x,j)=>j===i?np:x)})})),
    ce("div",{style:{display:"flex",gap:"10px",marginTop:"15px"}},
      Btn("+ Produkt",()=>setCurWin({...curWin,products:[...curWin.products,{id:Date.now(),type:"zaslona",par:{},c:{},fabP:0}]})),
      Btn("Zapisz",()=>{
          setClients(prev=>prev.map(c=>c.id===curCId?{...c,rooms:c.rooms.map(r=>r.id===curRId?{...r,windows:r.windows.find(w=>w.id===curWin.id)?r.windows.map(w=>w.id===curWin.id?curWin:w):[...r.windows,curWin]}:r)}:c));
          setScreen("windows");
      },true)
    )
  );

  return ce("div",null,content,modal&&ce(ModalContent));
}

ReactDOM.createRoot(document.getElementById("root")).render(ce(App));
})();
</script>
</body>
</html>
