<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porter Design - Kalkulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-chip { background-color: #f0fdf4 !important; border-color: #22c55e !important; color: #166534 !important; font-weight: bold; }
        .card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        input { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #22c55e; }
        .chip { cursor: pointer; border: 2px solid #f1f5f9; padding: 8px; border-radius: 12px; text-align: center; font-size: 11px; transition: all 0.2s; background: #fff; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-40 font-sans">

    <div class="max-w-2xl mx-auto p-4 space-y-6">
        <div class="card p-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-green-700 italic">PORTER DESIGN</h1>
                <input type="text" id="clientName" placeholder="Imię i nazwisko klienta" class="mt-2 w-full">
            </div>
            <button onclick="addRoom()" class="bg-green-600 text-white px-5 py-3 rounded-xl font-bold shadow-lg hover:bg-green-700 transition-all">
                + Dodaj Pokój
            </button>
        </div>

        <div id="roomsList" class="space-y-6"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-6 shadow-2xl z-50">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Suma do zapłaty</p>
                <p id="grandTotal" class="text-3xl font-black text-green-600">0,00 zł</p>
            </div>
            <button onclick="window.print()" class="bg-slate-900 text-white px-8 py-4 rounded-xl font-bold">
                <i class="fas fa-print mr-2"></i> DRUKUJ PDF
            </button>
        </div>
    </div>

    <script>
        let state = {
            rooms: [
                { id: 1, name: 'Salon', windows: [{ id: 101, type: 'Zasłony', szer: '', wys: '', szycie: 100, marsz: 1.5, kat: 160, total: 0 }] }
            ]
        };

        function render() {
            const container = document.getElementById('roomsList');
            container.innerHTML = '';

            state.rooms.forEach(room => {
                const roomDiv = document.createElement('div');
                roomDiv.className = 'card overflow-hidden';
                roomDiv.innerHTML = `
                    <div class="bg-slate-50 px-6 py-3 border-b flex justify-between items-center">
                        <input type="text" value="${room.name}" onchange="updateRoomName(${room.id}, this.value)" class="bg-transparent border-none p-0 font-bold text-xs uppercase tracking-widest text-slate-500">
                        <button onclick="deleteRoom(${room.id})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="p-6 space-y-6" id="winList-${room.id}"></div>
                    <div class="px-6 pb-6">
                        <button onclick="addWindow(${room.id})" class="w-full py-3 border-2 border-dashed border-slate-100 rounded-xl text-slate-400 text-xs font-bold hover:bg-slate-50 transition-all">+ DODAJ OKNO</button>
                    </div>
                `;
                container.appendChild(roomDiv);

                const winContainer = document.getElementById(`winList-${room.id}`);
                room.windows.forEach(win => {
                    const winDiv = document.createElement('div');
                    winDiv.className = 'p-4 bg-slate-50 rounded-2xl space-y-4 border border-slate-100';
                    winDiv.innerHTML = `
                        <div class="grid grid-cols-5 gap-1">
                            ${['Zasłony', 'Firany', 'Żaluzje', 'KAES', 'Rolety'].map(t => `
                                <div onclick="updateWin(${room.id}, ${win.id}, 'type', '${t}')" class="chip ${win.type === t ? 'active-chip' : ''}">${t}</div>
                            `).join('')}
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" placeholder="Szerokość" value="${win.szer}" oninput="updateWin(${room.id}, ${win.id}, 'szer', this.value)">
                            <input type="number" placeholder="Wysokość" value="${win.wys}" oninput="updateWin(${room.id}, ${win.id}, 'wys', this.value)">
                        </div>
                        ${(win.type === 'Zasłony' || win.type === 'Firany') ? `
                            <div class="grid grid-cols-2 gap-2">
                                <div onclick="updateWin(${room.id}, ${win.id}, 'szycie', 100)" class="chip ${win.szycie == 100 ? 'active-chip' : ''}">FLEX</div>
                                <div onclick="updateWin(${room.id}, ${win.id}, 'szycie', 110)" class="chip ${win.szycie == 110 ? 'active-chip' : ''}">WAVE</div>
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div onclick="updateWin(${room.id}, ${win.id}, 'kat', 160)" class="chip ${win.kat == 160 ? 'active-chip' : ''}">BASIC</div>
                                <div onclick="updateWin(${room.id}, ${win.id}, 'kat', 190)" class="chip ${win.kat == 190 ? 'active-chip' : ''}">STD</div>
                                <div onclick="updateWin(${room.id}, ${win.id}, 'kat', 240)" class="chip ${win.kat == 240 ? 'active-chip' : ''}">PREM</div>
                            </div>
                        ` : ''}
                        <div class="flex justify-between items-center pt-2">
                            <button onclick="deleteWin(${room.id}, ${win.id})" class="text-[10px] text-slate-300 font-bold uppercase">Usuń okno</button>
                            <span class="font-black text-slate-700">${win.total.toLocaleString('pl-PL', {style:'currency', currency:'PLN'})}</span>
                        </div>
                    `;
                    winContainer.appendChild(winDiv);
                });
            });
            updateGrandTotal();
        }

        function updateWin(rId, wId, key, val) {
            const room = state.rooms.find(r => r.id === rId);
            const win = room.windows.find(w => w.id === wId);
            win[key] = val;
            
            // Obliczenia
            if (win.type === 'Zasłony' || win.type === 'Firany') {
                const s = parseFloat(win.szer) || 0;
                win.total = ((s * win.marsz) / 100) * (parseFloat(win.kat) + parseFloat(win.szycie));
            } else if (win.type === 'Żaluzje') {
                const s = parseFloat(win.szer) || 0;
                const w = parseFloat(win.wys) || 0;
                win.total = Math.max((s * w) / 10000, 1) * 450;
            } else { win.total = 0; }
            
            render();
        }

        function addRoom() {
            state.rooms.push({ id: Date.now(), name: 'Nowy pokój', windows: [] });
            render();
        }

        function addWindow(rId) {
            const room = state.rooms.find(r => r.id === rId);
            room.windows.push({ id: Date.now(), type: 'Zasłony', szer: '', wys: '', szycie: 100, marsz: 1.5, kat: 160, total: 0 });
            render();
        }

        function deleteRoom(id) { state.rooms = state.rooms.filter(r => r.id !== id); render(); }
        function deleteWin(rId, wId) { 
            const room = state.rooms.find(r => r.id === rId);
            room.windows = room.windows.filter(w => w.id !== wId); 
            render(); 
        }
        function updateRoomName(id, val) { state.rooms.find(r => r.id === id).name = val; }

        function updateGrandTotal() {
            let total = 0;
            state.rooms.forEach(r => r.windows.forEach(w => total += w.total));
            document.getElementById('grandTotal').innerText = total.toLocaleString('pl-PL', {style:'currency', currency:'PLN'});
        }

        render();
    </script>
</body>
</html>
