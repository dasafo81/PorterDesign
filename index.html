<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Porter Design - System Handlowy</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#ffffff;--bg2:#f7f7f5;
      --bd1:#d0d0cc;--bd2:#e0e0dc;--bd3:#ececea;
      --t1:#1a1a18;--t2:#6b6b66;--t3:#a0a09c;
      --accent:#3B6D11; --accent-l:#EAF3DE;
      --wb:#FAEEDA;--wbd:#EF9F27;--wt:#633806;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--t1);min-height:100vh;}
    #root{max-width:480px;margin:20px auto;background:var(--bg);min-height:90vh;padding:1.5rem;border-radius:20px;box-shadow:var(--shadow);}
    input,select,button{font-family:inherit; outline:none;}
    .card { background:#fff; border:1px solid var(--bd3); border-radius:15px; padding:15px; margin-bottom:12px; transition: 0.2s; }
    .icon-box { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; margin-right:10px; font-size:16px; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
(function(){
"use strict";
var ce=React.createElement,useState=React.useState,Fragment=React.Fragment;

// --- DANE ---
var MY_DATA = "PD Porter Design Paulina Porter\nul. Woronieckiego 6C/2, 05-220 Zielonka\nNIP: 8121803400";
var FABRICS=[{name:"Alise",brutto:230},{name:"Alma",brutto:165},{name:"Altamira",brutto:250},{name:"Alto",brutto:120},{name:"Amber",brutto:110},{name:"Antonio",brutto:220}];

// Tabele
var RCITY={80:83.8,100:90.78,120:107.57,140:114.57,160:121.55,180:135.87,200:149.79,300:216.67};
var KW={biala:{100:124,150:173,200:221,250:287,300:336,400:443},czarna:{100:143,150:197,200:221,250:327,300:380,400:501}};
var KSLIM={150:658,200:704,250:750,300:816,400:952,500:1108};

function lookup(val,obj){
  var keys=Object.keys(obj).map(Number).sort((a,b)=>a-b);
  var k=keys.find(k=>k>=val)||keys[keys.length-1];
  return obj[k];
}

function calc(p){
  var c=p.c||{}, par=p.par||{};
  var fabP = p.fabMan ? parseFloat(p.fabMan) : (p.fabP || 0);
  var total=0;
  if(p.type==="zaslona" || p.type==="firana"){
    var w=parseFloat(par.wCm)||0, m=parseFloat(c.mars)||1.5;
    if(w>0 && fabP>0) total = ((w/100)*m + 0.2) * (fabP + 100);
  } else if(p.type==="szyna"){
    var l=parseFloat(par.len)||0;
    total = (c.ks==="wave") ? lookup(l, KW[c.kk||"biala"]) : (l/100)*80;
  } else if(p.type==="zaluzja"){
    total = Math.max(0.5, (parseFloat(par.wCm)/100)*(parseFloat(par.hCm)/100)) * 450;
  } else if(p.type==="roleta"){
    total = lookup(parseFloat(par.wCm)||0, RCITY) + (fabP || 0);
  } else if(p.type==="karnisz"){
    total = lookup(parseFloat(par.len)||0, KSLIM) + 644;
  }
  return total || 0;
}

// --- UI COMPONENTS ---
var IST={padding:"10px",fontSize:"14px",border:"1px solid var(--bd2)",borderRadius:"8px",width:"100%",marginBottom:"10px"};
function Btn(l,onClick,pri){
  return ce("button",{onClick:onClick,style:{padding:"10px 18px",borderRadius:10,border:"none",background:pri?"#1a1a18":"var(--bd3)",color:pri?"#fff":"#000",fontWeight:600,cursor:"pointer",marginRight:5}},l);
}

function ProdCard(p){
  var pr=p.prod, c=pr.c||{}, par=pr.par||{};
  var val = calc(pr);
  var types=[{id:"zaslona",l:"Zasłona",i:"🧤",b:"#EAF3DE"},{id:"firana",l:"Firana",i:"🌬️",b:"#EAF3DE"},{id:"zaluzja",l:"Żaluzja",i:"📏",b:"#FAEEDA"},{id:"roleta",l:"Roleta",i:"🌀",b:"#FAEEDA"},{id:"szyna",l:"KAES",i:"🛤️",b:"#ececea"},{id:"karnisz",l:"Karnisz",i:"⚡",b:"#ececea"}];

  return ce("div",{className:"card"},
    ce("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:12}},
       ce("b",{},"Konfiguracja"),ce("button",{onClick:p.onRemove,style:{color:"red",border:"none",background:"none"}},"usuń")),
    ce("div",{style:{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}},
       types.map(t=>ce("button",{key:t.id,onClick:()=>p.onChange({...pr,type:t.id,fabP:0,fabMan:"",fabName:""}),style:{fontSize:11,padding:"6px 10px",background:pr.type===t.id?t.b:"#fff",border:"1px solid "+(pr.type===t.id?"#000":"var(--bd2)"),borderRadius:10}},t.i+" "+t.l))),
    
    (pr.type!=="szyna" && pr.type!=="karnisz") && ce("div",{style:{display:"flex",gap:8}},
       ce("input",{placeholder:"Szer (cm)",value:par.wCm||"",type:"number",onChange:e=>p.onChange({...pr,par:{...par,wCm:e.target.value}}),style:IST}),
       ce("input",{placeholder:"Wys (cm)",value:par.hCm||"",type:"number",onChange:e=>p.onChange({...pr,par:{...par,hCm:e.target.value}}),style:IST})),
    
    (pr.type==="szyna"||pr.type==="karnisz") && ce("input",{placeholder:"Długość (cm)",value:par.len||"",type:"number",onChange:e=>p.onChange({...pr,par:{...par,len:e.target.value}}),style:IST}),

    (pr.type==="zaslona"||pr.type==="firana"||pr.type==="roleta") && ce(Fragment,null,
       pr.type!=="roleta" && ce("select",{value:c.mars||"1.5",onChange:e=>p.onChange({...pr,c:{...c,mars:e.target.value}}),style:IST},ce("option",{value:"1.5"},"Marszczenie 1.5x"),ce("option",{value:"2.0"},"Marszczenie 2.0x")),
       ce("select",{value:pr.fabName||"",onChange:e=>{
          var f=FABRICS.find(x=>x.name===e.target.value);
          p.onChange({...pr,fabName:f?f.name:"",fabP:f?f.brutto:0,fabMan:""});
       },style:IST},ce("option",{value:""},"--- wybierz tkaninę ---"),FABRICS.map(f=>ce("option",{key:f.name,value:f.name},f.name+" ("+f.brutto+"zł)"))),
       ce("input",{placeholder:"LUB własna cena mb",value:pr.fabMan||"",type:"number",onChange:e=>p.onChange({...pr,fabMan:e.target.value,fabName:"",fabP:0}),style:IST})),
    
    pr.type==="szyna" && ce("div",{style:{display:"flex",gap:5}},
       ce("select",{value:c.ks||"flex",onChange:e=>p.onChange({...pr,c:{...c,ks:e.target.value}}),style:IST},ce("option",{value:"flex"},"Flex"),ce("option",{value:"wave"},"Wave")),
       c.ks==="wave" && ce("select",{value:c.kk||"biala",onChange:e=>p.onChange({...pr,c:{...c,kk:e.target.value}}),style:IST},ce("option",{value:"biala"},"Biała"),ce("option",{value:"czarna"},"Czarna"))),

    val>0 && ce("div",{style:{padding:10,background:"#f0f9eb",borderRadius:8,fontWeight:700,textAlign:"right"}},"Suma: "+Math.round(val)+" zł")
  );
}

function App(){
  var [screen,setScreen]=useState("home");
  var [clients,setClients]=useState([]);
  var [cId,setCId]=useState(null);
  var [rId,setRId]=useState(null);
  var [curWin,setCurWin]=useState(null);
  var [modal,setModal]=useState(null);

  var client=clients.find(c=>c.id===cId);
  var room=client?client.rooms.find(r=>r.id===rId):null;

  function pdf(){
    var {jsPDF}=window.jspdf; var doc=new jsPDF();
    doc.setFontSize(14); doc.text("PORTER DESIGN - OFERTA", 10, 20);
    doc.setFontSize(10); doc.text(MY_DATA, 10, 30);
    doc.text("Klient: "+client.name, 10, 50);
    var y=65; var total=0;
    client.rooms.forEach(r=>{
      doc.setFontSize(12); doc.text(r.name.toUpperCase(), 10, y); y+=7;
      r.windows.forEach(w=>{
        var wt=w.products.reduce((a,p)=>a+calc(p),0);
        doc.setFontSize(10); doc.text("- "+w.name+": "+Math.round(wt)+" zl", 15, y); y+=6;
        total+=wt;
      }); y+=4;
    });
    doc.text("SUMA: "+Math.round(total)+" zl", 10, y+10);
    doc.save("Wycena.pdf");
  }

  function Modal(){
    var [v1,setV1]=useState(""); var [v2,setV2]=useState("");
    return ce("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9}},
      ce("div",{style:{background:"#fff",padding:25,borderRadius:20,width:300}},
        ce("h3",{style:{marginBottom:15}},"Dodaj"),
        ce("input",{placeholder:"Nazwa",value:v1,onChange:e=>setV1(e.target.value),style:IST,autoFocus:true}),
        modal==="client" && ce("input",{placeholder:"Adres",value:v2,onChange:e=>setV2(e.target.value),style:IST}),
        Btn("Dodaj",()=>{
          if(modal==="client"){ var nc={id:Date.now(),name:v1,addr:v2,rooms:[]}; setClients([nc,...clients]); setCId(nc.id); setScreen("rooms"); }
          if(modal==="room") setClients(clients.map(c=>c.id===cId?{...c,rooms:[...c.rooms,{id:Date.now(),name:v1,windows:[]}]}:c));
          if(modal==="win"){ setCurWin({id:Date.now(),name:v1,products:[]}); setScreen("detail"); }
          setModal(null);
        },true), Btn("X",()=>setModal(null))
      )
    );
  }

  var content=null;
  if(screen==="home") content=ce("div",null,
    ce("h2",{style:{marginBottom:20}},"Klienci"),
    clients.map(c=>ce("div",{key:c.id,className:"card",onClick:()=>{setCId(c.id);setScreen("rooms")}},ce("b",null,"👤 "+c.name))),
    Btn("+ Nowy Klient",()=>setModal("client"),true)
  );
  else if(screen==="rooms") content=ce("div",null,
    ce("h2",null,client.name),
    ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,margin:"20px 0"}},
      client.rooms.map(r=>ce("div",{key:r.id,onClick:()=>{setRId(r.id);setScreen("windows")},style:{padding:20,background:"#f7f7f5",borderRadius:15,textAlign:"center",border:"1px solid var(--bd3)"}},"🏠 "+r.name)),
      ce("div",{onClick:()=>setModal("room"),style:{padding:20,border:"2px dashed #ccc",borderRadius:15,textAlign:"center"}},"+ Pokój")),
    Btn("Eksport PDF",pdf,true), Btn("Wstecz",()=>setScreen("home"))
  );
  else if(screen==="windows") content=ce("div",null,
    ce("h2",null,room.name),
    room.windows.map(w=>ce("div",{key:w.id,className:"card",onClick:()=>{setCurWin(w);setScreen("detail")}},"🪟 "+w.name)),
    Btn("+ Okno",()=>setModal("win"),true), Btn("Wstecz",()=>setScreen("rooms"))
  );
  else if(screen==="detail") content=ce("div",null,
    ce("h2",null,curWin.name),
    curWin.products.map((p,i)=>ce(ProdCard,{key:p.id,prod:p,onRemove:()=>setCurWin({...curWin,products:curWin.products.filter((_,j)=>j!==i)}),onChange:np=>setCurWin({...curWin,products:curWin.products.map((x,j)=>j===i?np:x)})})),
    Btn("+ Produkt",()=>setCurWin({...curWin,products:[...curWin.products,{id:Date.now(),type:"zaslona",par:{},c:{}}]})),
    Btn("Zapisz",()=>{
      setClients(clients.map(c=>c.id===cId?{...c,rooms:c.rooms.map(r=>r.id===rId?{...r,windows:r.windows.find(w=>w.id===curWin.id)?r.windows.map(w=>w.id===curWin.id?curWin:w):[...r.windows,curWin]}:r)}:c));
      setScreen("windows");
    },true)
  );

  return ce("div",null,
    ce("div",{style:{textAlign:"center",marginBottom:20,fontSize:20,fontWeight:800}},"🪟 PORTER DESIGN"),
    content, modal&&ce(Modal)
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(ce(App));
})();
</script>
</body>
</html>
