<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porter Design Pro - Ekspert Wycen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pd-dark: #121212;
            --pd-green: #2d4a22;
            --pd-green-light: #416b32;
            --pd-accent: #c5a059; /* Złoty akcent */
            --pd-card: #1e1e1e;
            --pd-text: #e0e0e0;
            --pd-muted: #888;
            --radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--pd-dark); 
            color: var(--pd-text); 
            margin: 0; padding: 0; line-height: 1.6;
        }

        #app { max-width: 600px; margin: 0 auto; padding: 20px; min-height: 100vh; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 20px; font-weight: 800; color: var(--pd-accent); text-transform: uppercase; letter-spacing: 2px; }

        /* KARTY */
        .card {
            background: var(--pd-card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .card:active { transform: scale(0.99); }

        /* LISTY */
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .client-info h3 { margin: 0; font-size: 18px; color: #fff; }
        .client-info p { margin: 0; font-size: 12px; color: var(--pd-muted); }

        /* PRZYCISKI */
        .btn {
            background: var(--pd-green);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: var(--radius);
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn:hover { background: var(--pd-green-light); }
        .btn-outline { background: transparent; border: 1px solid #444; color: var(--pd-text); margin-bottom: 20px; width: auto; padding: 8px 15px; font-size: 13px; }
        .btn-add-room { background: #333; margin-top: 10px; font-size: 14px; }
        .btn-save { background: var(--pd-accent); color: var(--pd-dark); margin-top: 20px; }

        /* FORMULARZ */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: var(--pd-accent); margin-bottom: 5px; font-weight: 700; }
        select, input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        /* ROOM & ITEMS */
        .room-section { border-left: 3px solid var(--pd-green); padding-left: 15px; margin-bottom: 25px; }
        .room-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .item-row { 
            background: #252525; 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 5px; 
            font-size: 14px; 
            display: flex; 
            justify-content: space-between;
        }

        .price-badge { color: var(--pd-accent); font-weight: 800; }
        
        /* SUMA */
        .total-banner {
            background: linear-gradient(135deg, var(--pd-green), #1a2e14);
            padding: 25px;
            border-radius: var(--radius);
            text-align: center;
            margin-top: 30px;
            border: 1px solid var(--pd-green-light);
        }
        .total-amount { font-size: 32px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

<div id="app">
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const { useState, useEffect, createElement: ce } = React;

function PorterApp() {
    const [view, setView] = useState('LIST'); // LIST, DETAILS, CALC
    const [customers, setCustomers] = useState(() => JSON.parse(localStorage.getItem('pd_data') || '[]'));
    const [activeId, setActiveId] = useState(null);
    const [activeRoomIdx, setActiveRoomIdx] = useState(null);

    // Stan kalkulatora
    const [form, setForm] = useState({ prod: 'Drewno 50mm', w: 100, h: 150, opt: 'Standard' });

    useEffect(() => { localStorage.setItem('pd_data', JSON.stringify(customers)); }, [customers]);

    const activeCust = customers.find(c => c.id === activeId);

    // FUNKCJE LOGICZNE
    const addNewCustomer = () => {
        const name = prompt("Nazwa klienta / Projektu:");
        if (!name) return;
        const newCust = { id: Date.now(), name, date: new Date().toLocaleDateString(), rooms: [] };
        setCustomers([newCust, ...customers]);
    };

    const addRoom = () => {
        const rName = prompt("Nazwa pomieszczenia (np. Salon):");
        if (!rName) return;
        const updated = customers.map(c => c.id === activeId ? { ...c, rooms: [...c.rooms, { name: rName, items: [] }] } : c);
        setCustomers(updated);
    };

    const saveCalculation = () => {
        // Tu docelowo wejdą Twoje tabele. Teraz prosta logika testowa.
        const basePrice = (form.w * form.h * 0.03); 
        const newItem = {
            id: Date.now(),
            desc: `${form.prod} (${form.w}x${form.h}cm)`,
            price: Math.round(basePrice)
        };

        const updated = customers.map(c => {
            if (c.id === activeId) {
                const newRooms = [...c.rooms];
                newRooms[activeRoomIdx].items.push(newItem);
                return { ...c, rooms: newRooms };
            }
            return c;
        });
        setCustomers(updated);
        setView('DETAILS');
    };

    // --- WIDOK: LISTA KLIENTÓW ---
    if (view === 'LIST') {
        return ce('div', null,
            ce('div', { className: 'header' }, 
                ce('div', { className: 'logo' }, "Porter Design Pro"),
                ce('i', { className: 'fa-solid fa-sliders' })
            ),
            ce('h2', { style: { marginBottom: '20px' } }, "Twoje Projekty"),
            customers.length === 0 && ce('p', { style: { color: '#666', textAlign: 'center' } }, "Brak zapisanych wycen."),
            customers.map(c => ce('div', { key: c.id, className: 'card flex-row', onClick: () => { setActiveId(c.id); setView('DETAILS'); } },
                ce('div', { className: 'client-info' }, 
                    ce('h3', null, ce('i', { className: 'fa-solid fa-user-tie', style: { marginRight: '10px', color: 'var(--pd-accent)' } }), c.name),
                    ce('p', null, ce('i', { className: 'fa-solid fa-calendar', style: { marginRight: '5px' } }), c.date)
                ),
                ce('i', { className: 'fa-solid fa-chevron-right', style: { color: '#444' } })
            )),
            ce('button', { className: 'btn', style: { marginTop: '20px' }, onClick: addNewCustomer }, ce('i', { className: 'fa-solid fa-plus' }), "Dodaj Nową Wizytę")
        );
    }

    // --- WIDOK: SZCZEGÓŁY WIZYTY (POKOJE) ---
    if (view === 'DETAILS' && activeCust) {
        const grandTotal = activeCust.rooms.reduce((acc, r) => acc + r.items.reduce((s, i) => s + i.price, 0), 0);

        return ce('div', null,
            ce('button', { className: 'btn-outline', onClick: () => setView('LIST') }, ce('i', { className: 'fa-solid fa-arrow-left' }), " Powrót"),
            ce('div', { className: 'header' }, ce('h2', null, activeCust.name)),
            
            activeCust.rooms.map((room, rIdx) => ce('div', { key: rIdx, className: 'room-section' },
                ce('div', { className: 'room-title' }, 
                    ce('span', null, ce('i', { className: 'fa-solid fa-couch', style: { color: 'var(--pd-accent)' } }), " " + room.name),
                    ce('span', { className: 'price-badge' }, room.items.reduce((s, i) => s + i.price, 0) + " zł")
                ),
                room.items.map(item => ce('div', { key: item.id, className: 'item-row' },
                    ce('span', null, item.desc),
                    ce('span', { style: { fontWeight: 'bold' } }, item.price + " zł")
                )),
                ce('button', { className: 'btn btn-add-room', onClick: () => { setActiveRoomIdx(rIdx); setView('CALC'); } }, ce('i', { className: 'fa-solid fa-calculator' }), "Dodaj produkt")
            )),

            ce('button', { className: 'btn', style: { background: '#333', marginTop: '20px' }, onClick: addRoom }, ce('i', { className: 'fa-solid fa-folder-plus' }), "Dodaj Pomieszczenie"),
            
            ce('div', { className: 'total-banner' }, 
                ce('p', { style: { margin: 0, textTransform: 'uppercase', fontSize: '12px', letterSpacing: '1px' } }, "Wartość całkowita projektu"),
                ce('div', { className: 'total-amount' }, grandTotal + " zł")
            )
        );
    }

    // --- WIDOK: KALKULATOR EKSPERCKI ---
    if (view === 'CALC') {
        return ce('div', null,
            ce('button', { className: 'btn-outline', onClick: () => setView('DETAILS') }, "Anuluj"),
            ce('h2', null, "Konfiguracja Produktu"),
            ce('div', { className: 'card' },
                ce('div', { className: 'form-group' },
                    ce('label', null, "Kategoria Produktu"),
                    ce('select', { value: form.prod, onChange: e => setForm({ ...form, prod: e.target.value }) },
                        ce('option', null, "Drewno 50mm"),
                        ce('option', null, "Bambus 50mm"),
                        ce('option', null, "Aluminium 25mm"),
                        ce('option', null, "Karnisz Elektryczny Slim"),
                        ce('option', null, "Szyna Kaes Wave")
                    )
                ),
                ce('div', { style: { display: 'flex', gap: '15px' } },
                    ce('div', { className: 'form-group', style: { flex: 1 } },
                        ce('label', null, "Szerokość (cm)"),
                        ce('input', { type: 'number', value: form.w, onChange: e => setForm({ ...form, w: e.target.value }) })
                    ),
                    ce('div', { className: 'form-group', style: { flex: 1 } },
                        ce('label', null, "Wysokość (cm)"),
                        ce('input', { type: 'number', value: form.h, onChange: e => setForm({ ...form, h: e.target.value }) })
                    )
                ),
                ce('div', { className: 'form-group' },
                    ce('label', null, "Opcje dodatkowe"),
                    ce('select', null, 
                        ce('option', null, "Montaż standardowy"),
                        ce('option', null, "Montaż bezinwazyjny (+ doplata)"),
                        ce('option', null, "Prowadzenie boczne")
                    )
                ),
                ce('button', { className: 'btn btn-save', onClick: saveCalculation }, ce('i', { className: 'fa-solid fa-check' }), "Zatwierdź i wyceń")
            )
        );
    }
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(ce(PorterApp));
</script>

</body>
</html>
